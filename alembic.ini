# Alembic configuration for oauth-lab.
#
# The database URL is intentionally NOT set here. `migrations/env.py` resolves
# it from `Settings().database_url` (env var OAUTH_LAB_DATABASE_URL) so there is
# a single source of truth shared with the running application — no risk of the
# migration tooling and the app drifting onto different databases.

[alembic]
# Path to migration scripts, relative to this file (repo root).
script_location = migrations

# Template used to generate new migration files (timestamp + slug, readable).
# %% is escaped for ConfigParser interpolation.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Keep filesystem paths POSIX-style on every platform.
sourceless = false

# sqlalchemy.url is deliberately absent — env.py supplies it from Settings.

# Logging — standard Alembic stanza.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
