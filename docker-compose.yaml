services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oauth
      POSTGRES_PASSWORD: oauth
      POSTGRES_DB: oauth_lab
    ports:
      - "5432:5432"
    volumes:
      - oauth_lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oauth -d oauth_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      OAUTH_LAB_DATABASE_URL: postgresql+asyncpg://oauth:oauth@db:5432/oauth_lab
      OAUTH_LAB_ISSUER: http://localhost:8000
    ports:
      - "8000:8000"

volumes:
  oauth_lab_pgdata:
