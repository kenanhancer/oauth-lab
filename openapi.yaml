openapi: 3.1.0
info:
  contact:
    name: oauth-openapi project
    url: https://github.com/kenanhancer/oauth-openapi
  description: |
    # OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI

    This specification describes the HTTP surface of an OAuth 2.0 / OpenID Connect
    authorization server in a vendor-neutral way. Every endpoint and field is
    cross-referenced to the source RFC or specification section.

    ## Covered specifications

    | Spec | Year | Subject |
    |---|---|---|
    | RFC 6749 | 2012 | OAuth 2.0 Authorization Framework |
    | RFC 6750 | 2012 | Bearer Token Usage |
    | RFC 7009 | 2013 | Token Revocation |
    | RFC 7517 | 2015 | JSON Web Key (JWK / JWKS) |
    | RFC 7519 | 2015 | JSON Web Token (JWT) |
    | RFC 7636 | 2015 | PKCE — Proof Key for Code Exchange |
    | RFC 7662 | 2015 | Token Introspection |
    | RFC 8414 | 2018 | Authorization Server Metadata |
    | RFC 8628 | 2019 | Device Authorization Grant |
    | RFC 8693 | 2020 | Token Exchange |
    | RFC 9068 | 2021 | JWT Profile for OAuth 2.0 Access Tokens |
    | RFC 9126 | 2021 | Pushed Authorization Requests (PAR) |
    | RFC 9396 | 2023 | Rich Authorization Requests (RAR) |
    | RFC 9449 | 2023 | DPoP — Demonstrating Proof of Possession |
    | RFC 9700 | 2025 | OAuth 2.0 Security Best Current Practice |
    | OAuth 2.1 (draft) | ongoing | Consolidated modern best practices |
    | OIDC Core 1.0 | 2014 | OpenID Connect identity layer |
    | OIDC Discovery 1.0 | 2014 | `.well-known/openid-configuration` schema |

    ## Modeling notes

    - **`/authorize` is browser-driven.** OpenAPI cannot precisely model 302 redirects
      to a client-controlled `redirect_uri` followed by HTML consent. The parameters
      and redirect semantics are described, but the response body is an approximation.
      The exact behavior is in RFC 6749 §4.1.2.

    - **`/token` uses a `grant_type` discriminator.** Per RFC 6749 §3.2, all grants
      POST to one endpoint and are dispatched by the `grant_type` form field. This
      spec uses `oneOf` + discriminator. Tooling without discriminator support may
      need to flatten the schema.

    - **OAuth 2.1 defaults are applied.** PKCE is mandatory for all public clients;
      Implicit (`response_type=token`) and Resource Owner Password (`grant_type=password`)
      grants are excluded as they are deprecated by OAuth 2.1.

    - **DPoP is supported via a request header.** The `DPoP` header is documented on
      relevant endpoints; the proof JWT itself is not modeled as a body schema.
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  title: OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI Specification
  version: 1.0.0
externalDocs:
  description: OAuth 2.1 working draft (the primary modern reference)
  url: https://datatracker.ietf.org/doc/draft-ietf-oauth-v2-1/
servers:
- description: "Authorization server, identified by its issuer URL"
  url: "https://{issuer}"
  variables:
    issuer:
      default: as.example.com
      description: |
        Hostname of the OAuth 2.0 / OIDC issuer. The exact path layout under this
        host is vendor-specific; use the discovery endpoints to obtain canonical
        URLs at runtime.
tags:
- description: RFC 6749 endpoints — authorize and token
  name: Core
- description: RFC 7009 (revoke) + RFC 7662 (introspect)
  name: Token Lifecycle
- description: RFC 8628
  name: Device Flow
- description: RFC 9126 — Pushed Authorization Requests
  name: PAR
- description: OIDC Core — UserInfo
  name: OpenID Connect
- description: RFC 8414 + OIDC Discovery — `.well-known` metadata
  name: Discovery
- description: RFC 7517 — JSON Web Key Set
  name: JWKS
paths:
  /authorize:
    get:
      description: |
        Initiates a browser-driven authorization request. The user-agent is
        navigated to this URL; the server authenticates the resource owner and
        obtains consent, then redirects the user-agent back to `redirect_uri`
        with a `code` (success) or an `error`.

        Under OAuth 2.1 only `response_type=code` is permitted (Implicit is
        deprecated). PKCE (`code_challenge`) is mandatory.
      externalDocs:
        description: "RFC 6749 §4.1.1, OIDC Core §3.1.2.1"
        url: https://datatracker.ietf.org/doc/html/rfc6749#section-4.1.1
      operationId: authorize
      parameters:
      - $ref: "#/components/parameters/ResponseType"
      - $ref: "#/components/parameters/ClientId"
      - $ref: "#/components/parameters/RedirectUri"
      - $ref: "#/components/parameters/Scope"
      - $ref: "#/components/parameters/State"
      - $ref: "#/components/parameters/CodeChallenge"
      - $ref: "#/components/parameters/CodeChallengeMethod"
      - $ref: "#/components/parameters/Nonce"
      - $ref: "#/components/parameters/Prompt"
      - $ref: "#/components/parameters/LoginHint"
      - $ref: "#/components/parameters/MaxAge"
      - $ref: "#/components/parameters/AcrValues"
      - $ref: "#/components/parameters/ResponseMode"
      - $ref: "#/components/parameters/RequestUri"
      - $ref: "#/components/parameters/AuthorizationDetails"
      - $ref: "#/components/parameters/Resource"
      - $ref: "#/components/parameters/Display"
      - $ref: "#/components/parameters/UILocales"
      - $ref: "#/components/parameters/ClaimsLocales"
      - $ref: "#/components/parameters/IDTokenHint"
      - $ref: "#/components/parameters/Claims"
      - $ref: "#/components/parameters/Request"
      - $ref: "#/components/parameters/DPoPJKT"
      responses:
        "302":
          description: |
            User-agent redirect back to `redirect_uri`. The `Location`
            header carries:
            - on success: `code`, `state`, plus `iss` (RFC 9207) when the AS
              advertises `authorization_response_iss_parameter_supported`.
              For OIDC Hybrid (`response_type=code id_token`) it also carries
              `id_token` in the URL fragment.
            - on failure: `error`, `error_description`, `error_uri`, `state`,
              plus `iss` per RFC 9207.

            OAuth 2.1 §7.5.4 / RFC 9700 §4.11 RECOMMEND HTTP 303 over 302
            and PROHIBIT 307; both are modeled as alternative status codes.
          headers:
            Location:
              explode: false
              required: true
              schema:
                format: uri
                type: string
              style: simple
        "303":
          description: Same as 302; RECOMMENDED status code per OAuth 2.1 §7.5.4.
          headers:
            Location:
              explode: false
              required: true
              schema:
                format: uri
                type: string
              style: simple
        "200":
          content:
            text/html:
              schema:
                title: kid
                type: string
          description: HTML consent or authentication page (intermediate state)
        "400":
          content:
            text/html:
              schema:
                title: kid
                type: string
          description: |
            Non-redirecting error. Per RFC 6749 §4.1.2.1, when `redirect_uri`
            is missing, malformed, or does not match a registered URI, the
            AS MUST NOT redirect to it; instead it returns an HTML error page.
            Also returned for malformed `client_id`.
      summary: Authorization endpoint
      tags:
      - Core
  /token:
    post:
      description: |
        Issues access tokens. The `grant_type` form field selects the grant. All
        grants supported by OAuth 2.1 are modeled here:

        - `authorization_code` — RFC 6749 §4.1.3 (with PKCE per RFC 7636)
        - `client_credentials` — RFC 6749 §4.4
        - `refresh_token` — RFC 6749 §6
        - `urn:ietf:params:oauth:grant-type:device_code` — RFC 8628 §3.4
        - `urn:ietf:params:oauth:grant-type:jwt-bearer` — RFC 7523
        - `urn:ietf:params:oauth:grant-type:token-exchange` — RFC 8693

        The deprecated `password` and `implicit` grants are intentionally
        omitted (per OAuth 2.1).
      externalDocs:
        description: RFC 6749 §3.2
        url: https://datatracker.ietf.org/doc/html/rfc6749#section-3.2
      operationId: token
      parameters:
      - $ref: "#/components/parameters/DPoPHeader"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Access token issued
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlNoStore"
            Pragma:
              $ref: "#/components/headers/PragmaNoCache"
            DPoP-Nonce:
              $ref: "#/components/headers/DPoPNonce"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthError"
      security:
      - clientSecretBasic: []
      - clientSecretPost: []
      - clientAssertion: []
      - mtls: []
      - none: []
      summary: Token endpoint (all grants)
      tags:
      - Core
  /revoke:
    post:
      description: |
        Revokes an access or refresh token before its natural expiry. Per
        RFC 7009 §2.1, when a refresh token is revoked the AS SHOULD also
        invalidate all access tokens issued under the same authorization
        grant. (Cascade is from refresh → access; not the other direction.)
        A successful revocation always returns HTTP 200 with an empty body
        — even when the token is unknown to the server.
      externalDocs:
        description: RFC 7009 §2
        url: https://datatracker.ietf.org/doc/html/rfc7009#section-2
      operationId: revoke
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RevocationRequest"
        required: true
      responses:
        "200":
          description: Revocation accepted (returned even if the token was unknown).
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlNoStore"
            Pragma:
              $ref: "#/components/headers/PragmaNoCache"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthError"
      security:
      - clientSecretBasic: []
      - clientSecretPost: []
      - clientAssertion: []
      - mtls: []
      - none: []
      summary: Token revocation
      tags:
      - Token Lifecycle
  /introspect:
    post:
      description: |
        A protected resource queries the authorization server about the
        meta-information of a token (active state, scopes, expiry, subject).
        Critical for opaque (non-JWT) tokens. JWT tokens can usually be
        validated locally by verifying the signature against the JWKS.
      externalDocs:
        description: RFC 7662 §2
        url: https://datatracker.ietf.org/doc/html/rfc7662#section-2
      operationId: introspect
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IntrospectionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectionResponse"
            application/jwt:
              schema:
                $ref: "#/components/schemas/JWT"
          description: "Introspection result (always 200, even for inactive tokens)."
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlNoStore"
            Pragma:
              $ref: "#/components/headers/PragmaNoCache"
        "401":
          $ref: "#/components/responses/OAuthError"
      security:
      - clientSecretBasic: []
      - clientSecretPost: []
      - clientAssertion: []
      - mtls: []
      - bearerAuth: []
      summary: Token introspection
      tags:
      - Token Lifecycle
  /device_authorization:
    post:
      description: |
        Initiates the Device Authorization Grant. The client receives a
        `device_code` and `user_code`; the user is instructed to visit
        `verification_uri` on a second device and enter the `user_code`.
        The client then polls `/token` with
        `grant_type=urn:ietf:params:oauth:grant-type:device_code` until the
        user authorizes or `expires_in` elapses.

        Polling protocol (RFC 8628 §3.5): the AS may return `slow_down` to
        increase the polling interval by 5 seconds, or `authorization_pending`
        while the user is still consenting. Clients MUST stop polling on any
        non-pending error (`access_denied`, `expired_token`).

        The `device_code` MUST NOT be displayed to the end user.
        The `user_code` is per §6.1 displayed to the user; servers SHOULD
        accept dashed and case-insensitive variants.
      externalDocs:
        description: RFC 8628 §3.1
        url: https://datatracker.ietf.org/doc/html/rfc8628#section-3.1
      operationId: deviceAuthorization
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DeviceAuthorizationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAuthorizationResponse"
          description: Device authorization issued.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlNoStore"
            Pragma:
              $ref: "#/components/headers/PragmaNoCache"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthError"
      security:
      - clientSecretBasic: []
      - clientSecretPost: []
      - clientAssertion: []
      - mtls: []
      - none: []
      summary: Device Authorization Endpoint (RFC 8628)
      tags:
      - Device Flow
  /par:
    post:
      description: |
        Pushes the authorization request parameters to the server before the
        user-agent redirect. The server returns a short-lived `request_uri`
        that the client then passes (instead of the full request) to
        `/authorize`. This avoids leaking parameters via browser history,
        keeps URLs short, and enables integrity protection.

        Per §2.1, the request body MUST NOT contain a `request_uri` parameter.
        Per §4, when `/authorize` is reached via a PAR-issued `request_uri`,
        only `client_id` and `request_uri` are sent — all other parameters
        come from the pushed body.
      externalDocs:
        description: RFC 9126 §2
        url: https://datatracker.ietf.org/doc/html/rfc9126#section-2
      operationId: pushedAuthorizationRequest
      parameters:
      - $ref: "#/components/parameters/DPoPHeader"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/PARRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PARResponse"
          description: Pushed authorization request accepted.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlNoStore"
            Pragma:
              $ref: "#/components/headers/PragmaNoCache"
            DPoP-Nonce:
              $ref: "#/components/headers/DPoPNonce"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthError"
        "405":
          description: Method Not Allowed (RFC 9126 §2.3) — only POST is permitted.
        "413":
          description: Payload Too Large (RFC 9126 §2.3) — request exceeds AS-defined
            limit.
        "429":
          description: Too Many Requests (RFC 9126 §2.3) — rate limit exceeded.
      security:
      - clientSecretBasic: []
      - clientSecretPost: []
      - clientAssertion: []
      - mtls: []
      - none: []
      summary: Pushed Authorization Request (RFC 9126)
      tags:
      - PAR
  /userinfo:
    get:
      description: |
        Returns claims about the authenticated end-user. Requires a valid
        OIDC access token in the `Authorization` header (Bearer or DPoP).
        When the response is `application/jwt` (signed/encrypted), the JWT
        also carries `iss` and `aud` claims (OIDC Core §5.3.2).
      externalDocs:
        description: OIDC Core §5.3
        url: https://openid.net/specs/openid-connect-core-1_0.html#UserInfo
      operationId: userinfoGet
      parameters:
      - $ref: "#/components/parameters/DPoPHeader"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
            application/jwt:
              schema:
                $ref: "#/components/schemas/UserInfoSignedResponse"
          description: UserInfo claims
        "401":
          $ref: "#/components/responses/BearerError"
        "403":
          $ref: "#/components/responses/BearerError"
      security:
      - bearerAuth: []
      - dpop: []
      summary: "UserInfo endpoint (GET, OIDC)"
      tags:
      - OpenID Connect
    post:
      description: |
        Same semantics as GET; some clients prefer POST per OIDC Core §5.3.1.
        Either `application/x-www-form-urlencoded` (with `access_token` form
        field) or an Authorization header.
      externalDocs:
        description: OIDC Core §5.3.1
        url: https://openid.net/specs/openid-connect-core-1_0.html#UserInfoRequest
      operationId: userinfoPost
      parameters:
      - $ref: "#/components/parameters/DPoPHeader"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
            application/jwt:
              schema:
                $ref: "#/components/schemas/UserInfoSignedResponse"
          description: UserInfo claims
        "401":
          $ref: "#/components/responses/BearerError"
        "403":
          $ref: "#/components/responses/BearerError"
      security:
      - bearerAuth: []
      - dpop: []
      summary: "UserInfo endpoint (POST, OIDC)"
      tags:
      - OpenID Connect
  /jwks:
    get:
      description: |
        Returns the public keys used by this issuer to sign tokens (and
        encrypt requests, when applicable). Clients fetch this to verify
        JWT signatures locally. The actual path is announced by
        `jwks_uri` in the discovery document.
      externalDocs:
        description: RFC 7517 §5
        url: https://datatracker.ietf.org/doc/html/rfc7517#section-5
      operationId: jwks
      responses:
        "200":
          content:
            application/jwk-set+json:
              schema:
                $ref: "#/components/schemas/JWKS"
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"
          description: JSON Web Key Set
      summary: JSON Web Key Set
      tags:
      - JWKS
  /.well-known/openid-configuration:
    get:
      description: |
        Standardized discovery endpoint published by every OpenID Connect
        provider. The response describes all endpoints, supported flows,
        scopes, claims, signing algorithms, and capabilities.

        This is the **only path that is truly standardized across OIDC
        providers** — all other endpoint URLs are vendor-defined and must be
        read from this document.
      externalDocs:
        description: OIDC Discovery 1.0 §3
        url: https://openid.net/specs/openid-connect-discovery-1_0.html#ProviderMetadata
      operationId: openidConfiguration
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"
          description: Provider metadata
      summary: OIDC discovery metadata
      tags:
      - Discovery
  /.well-known/oauth-authorization-server:
    get:
      description: |
        Equivalent to the OIDC discovery document for plain OAuth 2.0
        servers that do not implement OpenID Connect. The response shape
        is a strict subset of the OIDC discovery document.
      externalDocs:
        description: RFC 8414 §3
        url: https://datatracker.ietf.org/doc/html/rfc8414#section-3
      operationId: authorizationServerMetadata
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"
          description: Authorization server metadata
      summary: OAuth 2.0 authorization-server metadata (RFC 8414)
      tags:
      - Discovery
components:
  headers:
    CacheControlNoStore:
      description: Required on token-bearing JSON responses (RFC 6749 §5.1).
      explode: false
      schema: {}
      style: simple
    PragmaNoCache:
      description: HTTP/1.0 cache directive paired with Cache-Control (RFC 6749 §5.1).
      explode: false
      schema: {}
      style: simple
    WWWAuthenticateBearer:
      description: |
        Bearer challenge from a protected resource (RFC 6750 §3). Format:
        `Bearer realm="<realm>", scope="<space-list>", error="<code>",
        error_description="<text>", error_uri="<uri>"`. All five parameters
        are OPTIONAL but at least `error` is included on 401/403 responses.
      explode: false
      schema: {}
      style: simple
    WWWAuthenticateDPoP:
      description: |
        DPoP challenge from a protected resource (RFC 9449 §7.1). Format
        mirrors Bearer plus an `algs` parameter listing accepted DPoP
        signing algorithms.
      explode: false
      schema: {}
      style: simple
    DPoPNonce:
      description: |
        Server-issued nonce that MUST be echoed in the next DPoP proof's
        `nonce` claim (RFC 9449 §8). Servers MAY rotate the nonce on every
        response.
      explode: false
      schema: {}
      style: simple
  parameters:
    ResponseType:
      description: |
        OAuth 2.1 §10.1 permits only `code` (the Authorization Code grant).
        OIDC Core §3.1.2.1 also defines `id_token` and `code id_token` for
        OIDC Hybrid Flow. The hybrid front-channel-token variants
        `code token` and `code id_token token` are intentionally excluded
        per OAuth 2.1 / RFC 9700 §2.1.2 because front-channel access tokens
        are insecure (browser history leakage).
      explode: true
      in: query
      name: response_type
      required: true
      schema:
        enum:
        - code
        - id_token
        - code id_token
        type: string
      style: form
    ClientId:
      description: The client identifier issued at registration time (RFC 6749 §2.2).
      explode: true
      in: query
      name: client_id
      required: true
      schema:
        type: string
      style: form
    RedirectUri:
      description: |
        Where the user-agent is redirected after authorization. Per OAuth
        2.1 §2.3.1 and RFC 9700 §4.1.3, the AS MUST compare against
        registered URIs **using exact-string matching**, not pattern
        matching. REQUIRED when the client has more than one registered
        redirect URI; OPTIONAL otherwise. Per RFC 6749 §4.1.2.1, when
        invalid, the AS MUST NOT redirect — it returns an HTML error page
        (modeled as the 400 response on `/authorize`).
      explode: true
      in: query
      name: redirect_uri
      required: false
      schema:
        format: uri
        type: string
      style: form
    Scope:
      description: |
        Space-delimited list of scopes. For OIDC, MUST include `openid` to
        request an ID token. Standard OIDC scopes: `profile`, `email`,
        `address`, `phone`, `offline_access`. Per RFC 6749 §3.3 ABNF, each
        scope token is `1*( %x21 / %x23-5B / %x5D-7E )` — printable ASCII
        excluding `"` and `\`; tokens are separated by single SP characters.
      explode: true
      in: query
      name: scope
      required: false
      schema:
        pattern: "^[\\x21\\x23-\\x5B\\x5D-\\x7E]+( [\\x21\\x23-\\x5B\\x5D-\\x7E]+)*$"
        type: string
      style: form
    State:
      description: |
        Opaque value used by the client to maintain state and prevent CSRF.
        The server returns it unchanged in the redirect. RFC 6749 §10.12.
      explode: true
      in: query
      name: state
      required: false
      schema:
        type: string
      style: form
    CodeChallenge:
      description: |
        PKCE challenge — `BASE64URL(SHA256(code_verifier))` for the `S256`
        method. 43-128 characters from the unreserved set
        `[A-Z] / [a-z] / [0-9] / "-" / "." / "_" / "~"`.
        **Mandatory in OAuth 2.1 for all clients.** RFC 7636 §4.2.
      explode: true
      in: query
      name: code_challenge
      required: true
      schema:
        maxLength: 128
        minLength: 43
        pattern: "^[A-Za-z0-9._~-]+$"
        type: string
      style: form
    CodeChallengeMethod:
      description: |
        Always `S256` per OAuth 2.1 §4.8 and RFC 9700 §4.8. The legacy
        `plain` method (RFC 7636 §4.4) is intentionally omitted; clients
        and servers compliant with OAuth 2.1 MUST use S256 only.
      explode: true
      in: query
      name: code_challenge_method
      required: true
      schema:
        default: S256
        enum:
        - S256
        type: string
      style: form
    Nonce:
      description: |
        OIDC: opaque random value bound to the ID token's `nonce` claim,
        for replay protection. OIDC Core §3.1.2.1.
      explode: true
      in: query
      name: nonce
      required: false
      schema:
        type: string
      style: form
    Prompt:
      description: |
        OIDC: how the auth server should prompt the user. Space-delimited.
      explode: true
      in: query
      name: prompt
      required: false
      schema:
        enum:
        - none
        - login
        - consent
        - select_account
        type: string
      style: form
    LoginHint:
      description: "OIDC: hint to the auth server about the login identifier (e.g.\
        \ e-mail)."
      explode: true
      in: query
      name: login_hint
      required: false
      schema:
        type: string
      style: form
    MaxAge:
      description: "OIDC: maximum allowed elapsed time since last authentication,\
        \ in seconds."
      explode: true
      in: query
      name: max_age
      required: false
      schema:
        minimum: 0
        type: integer
      style: form
    AcrValues:
      description: "OIDC: requested Authentication Context Class Reference values,\
        \ space-separated."
      explode: true
      in: query
      name: acr_values
      required: false
      schema:
        type: string
      style: form
    ResponseMode:
      description: |
        Mechanism for delivering the authorization response. `query`,
        `fragment`, `form_post` (OAuth 2.0 Form Post Response Mode).
      explode: true
      in: query
      name: response_mode
      required: false
      schema:
        enum:
        - query
        - fragment
        - form_post
        type: string
      style: form
    RequestUri:
      description: |
        Reference to a request previously submitted via PAR (RFC 9126 §4).
        When present, takes precedence over individual query parameters.
      explode: true
      in: query
      name: request_uri
      required: false
      schema:
        format: uri
        type: string
      style: form
    AuthorizationDetails:
      description: |
        Rich Authorization Requests (RAR) — JSON-encoded array of
        authorization detail objects. RFC 9396.
      explode: true
      in: query
      name: authorization_details
      required: false
      schema:
        type: string
      style: form
    Resource:
      description: |
        Indicator of the protected resource(s) for which authorization is
        requested. MUST be an absolute URI without a fragment component.
        MAY appear multiple times to request audience for multiple
        resources. RFC 8707 §2.
      explode: true
      in: query
      name: resource
      required: false
      schema:
        items:
          format: uri
          type: string
        type: array
      style: form
    Display:
      description: |
        OIDC: how the AS should display the authentication and consent UI.
        OIDC Core §3.1.2.1. Mandatory-to-implement (§15.1).
      explode: true
      in: query
      name: display
      required: false
      schema:
        enum:
        - page
        - popup
        - touch
        - wap
        type: string
      style: form
    UILocales:
      description: |
        OIDC: end-user UI language(s), space-separated BCP47 tags
        (e.g. `fr-CA fr en`). Mandatory-to-implement (§15.1).
      explode: true
      in: query
      name: ui_locales
      required: false
      schema:
        type: string
      style: form
    ClaimsLocales:
      description: |
        OIDC: preferred languages for Claims being returned, space-separated
        BCP47 tags. OIDC Core §5.2. Mandatory-to-implement (§15.1).
      explode: true
      in: query
      name: claims_locales
      required: false
      schema:
        type: string
      style: form
    IDTokenHint:
      description: |
        OIDC: previously issued ID Token passed as a hint about the user's
        current or past authenticated session. OIDC Core §3.1.2.1.
      explode: true
      in: query
      name: id_token_hint
      required: false
      schema:
        type: string
      style: form
    Claims:
      description: |
        OIDC: JSON-encoded object describing specific Claims being requested
        for delivery in the ID Token and/or UserInfo response. OIDC Core §5.5.
      explode: true
      in: query
      name: claims
      required: false
      schema:
        description: JSON-encoded object
        type: string
      style: form
    Request:
      description: |
        OIDC / RFC 9101 (JAR): a self-contained JWT containing the full
        authorization request as claims. Mutually exclusive with
        `request_uri`. OIDC Core §6.
      explode: true
      in: query
      name: request
      required: false
      schema:
        description: A signed (and optionally encrypted) JWT
        type: string
      style: form
    DPoPJKT:
      description: |
        DPoP key thumbprint to bind the resulting authorization code to a
        specific DPoP key, even before the token request. RFC 9449 §10.1.
      explode: true
      in: query
      name: dpop_jkt
      required: false
      schema:
        type: string
      style: form
    DPoPHeader:
      description: |
        DPoP proof JWT (RFC 9449 §4). Required on `/token`, `/par`,
        protected resources, and `/userinfo` whenever DPoP-bound access
        tokens are in use. Header value is a single compact-serialized JWT
        with `typ=dpop+jwt`, `alg`, `jwk` in the header and `jti`, `htm`,
        `htu`, `iat` claims (plus `ath` at resource servers and `nonce`
        when the AS issues a DPoP-Nonce challenge).
      explode: false
      in: header
      name: DPoP
      required: false
      schema:
        type: string
      style: simple
  responses:
    OAuthError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Standard OAuth 2.0 error response (RFC 6749 §5.2)
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Pragma:
          $ref: "#/components/headers/PragmaNoCache"
    BearerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: |
        Resource-server error per RFC 6750 §3 — includes a Bearer challenge
        in the WWW-Authenticate header.
      headers:
        WWW-Authenticate:
          $ref: "#/components/headers/WWWAuthenticateBearer"
    DPoPError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Resource-server error with a DPoP challenge (RFC 9449 §7.1).
      headers:
        WWW-Authenticate:
          $ref: "#/components/headers/WWWAuthenticateDPoP"
        DPoP-Nonce:
          $ref: "#/components/headers/DPoPNonce"
  schemas:
    TokenRequest:
      description: |
        Discriminated union of all supported token-request bodies, keyed by
        `grant_type` per RFC 6749 §3.2.
      discriminator:
        mapping:
          authorization_code: "#/components/schemas/AuthorizationCodeTokenRequest"
          client_credentials: "#/components/schemas/ClientCredentialsTokenRequest"
          refresh_token: "#/components/schemas/RefreshTokenRequest"
          urn:ietf:params:oauth:grant-type:device_code: "#/components/schemas/DeviceCodeTokenRequest"
          urn:ietf:params:oauth:grant-type:jwt-bearer: "#/components/schemas/JWTBearerTokenRequest"
          urn:ietf:params:oauth:grant-type:token-exchange: "#/components/schemas/TokenExchangeRequest"
        propertyName: grant_type
      oneOf:
      - $ref: "#/components/schemas/AuthorizationCodeTokenRequest"
      - $ref: "#/components/schemas/ClientCredentialsTokenRequest"
      - $ref: "#/components/schemas/RefreshTokenRequest"
      - $ref: "#/components/schemas/DeviceCodeTokenRequest"
      - $ref: "#/components/schemas/JWTBearerTokenRequest"
      - $ref: "#/components/schemas/TokenExchangeRequest"
    ClientAuthFields:
      properties:
        client_id:
          description: |
            REQUIRED for public clients (no client secret) and clients that
            authenticate via `client_assertion`. RFC 6749 §3.2.1.
          type: string
        client_secret:
          description: |
            Used with `client_id` for `client_secret_post` authentication.
            HTTP Basic (`client_secret_basic`) is preferred; this form-body
            variant is NOT RECOMMENDED per RFC 6749 §2.3.1.
          type: string
        client_assertion:
          description: |
            JWT bearing claims that authenticate the client. Used with
            `client_assertion_type` for `client_secret_jwt` or
            `private_key_jwt` authentication. RFC 7523 §2.2.
          type: string
        client_assertion_type:
          description: RFC 7523 §2.2.
          enum:
          - urn:ietf:params:oauth:client-assertion-type:jwt-bearer
          type: string
    ResourceIndicators:
      properties:
        resource:
          description: |
            Indicator(s) of the protected resource(s) for which the access
            token is requested. Each value MUST be an absolute URI without a
            fragment component. The parameter MAY be included multiple times
            in the underlying form-encoded body. RFC 8707.
          items:
            format: uri
            type: string
          type: array
    AuthorizationDetailsField:
      properties:
        authorization_details:
          description: |
            JSON-encoded array of `AuthorizationDetail` objects (RFC 9396 §5).
            Sent as a string because the form-encoded body cannot carry
            structured JSON natively. The decoded value conforms to
            `AuthorizationDetail[]`.
          type: string
    AuthorizationCodeTokenRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - properties:
          grant_type:
            enum:
            - authorization_code
            type: string
          code:
            description: The authorization code received from `/authorize`.
            type: string
          redirect_uri:
            description: |
              OPTIONAL under OAuth 2.1 §10.2 (was REQUIRED in OAuth 2.0
              §4.1.3). When present, MUST match the `redirect_uri` used at
              `/authorize`. Some legacy AS implementations still require it.
            format: uri
            type: string
          code_verifier:
            description: |
              PKCE verifier (RFC 7636 §4.1). 43-128 chars from the
              unreserved set `[A-Z] / [a-z] / [0-9] / "-" / "." / "_" / "~"`.
            maxLength: 128
            minLength: 43
            pattern: "^[A-Za-z0-9._~-]+$"
            type: string
        required:
        - code
        - code_verifier
        - grant_type
      description: |
        RFC 6749 §4.1.3 with PKCE per RFC 7636 §4.5. Under OAuth 2.1 §10.2 the
        `redirect_uri` parameter is no longer sent at the token endpoint and
        is omitted from `required`.
    ClientCredentialsTokenRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - $ref: "#/components/schemas/AuthorizationDetailsField"
      - properties:
          grant_type:
            enum:
            - client_credentials
            type: string
          scope:
            description: Space-delimited list of requested scopes.
            type: string
          audience:
            description: |
              NON-STANDARD — vendor extension (e.g. Auth0 uses `audience`
              instead of RFC 8707 `resource`). Prefer `resource`. Kept here
              for compatibility with vendor servers.
            type: string
        required:
        - grant_type
      description: "RFC 6749 §4.4. Service-to-service grant, no end user."
    RefreshTokenRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - $ref: "#/components/schemas/AuthorizationDetailsField"
      - properties:
          grant_type:
            enum:
            - refresh_token
            type: string
          refresh_token:
            type: string
          scope:
            description: |
              Optional. If present, MUST be no broader than the originally
              granted scope. RFC 8707: the `resource` parameter on a
              refresh request MUST be a subset of those originally granted.
            type: string
        required:
        - grant_type
        - refresh_token
      description: |
        RFC 6749 §6. Per OAuth 2.1 §4.3.1 and RFC 9700 §2.2.2 the refresh
        token SHOULD be sender-constrained (DPoP) or rotated on every use.
    DeviceCodeTokenRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - properties:
          grant_type:
            enum:
            - urn:ietf:params:oauth:grant-type:device_code
            type: string
          device_code:
            description: |
              The opaque `device_code` from `/device_authorization`.
              MUST NOT be displayed to the end user.
            type: string
        required:
        - device_code
        - grant_type
      description: RFC 8628 §3.4. Polled by the client until the user authorizes.
    JWTBearerTokenRequest:
      allOf:
      - $ref: "#/components/schemas/ResourceIndicators"
      - properties:
          grant_type:
            enum:
            - urn:ietf:params:oauth:grant-type:jwt-bearer
            type: string
          assertion:
            description: |
              Signed JWT bearer assertion. REQUIRED claims (RFC 7523 §3):
              `iss`, `sub`, `aud` (the AS token endpoint URL), `exp`.
              RECOMMENDED: `nbf`, `iat`, `jti`. The JWT MUST be digitally
              signed or MAC'd by the issuer and MUST be rejected by the AS
              if any required claim is missing or invalid.
            type: string
          scope:
            type: string
        required:
        - assertion
        - grant_type
      description: |
        RFC 7523 §2.1. Note that the JWT itself authenticates the client in
        most uses, so `client_assertion_*` is usually omitted.
    TokenExchangeRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - $ref: "#/components/schemas/AuthorizationDetailsField"
      - properties:
          grant_type:
            enum:
            - urn:ietf:params:oauth:grant-type:token-exchange
            type: string
          subject_token:
            description: Token representing the identity of the party on whose behalf
              the request is made.
            type: string
          subject_token_type:
            $ref: "#/components/schemas/TokenTypeURI"
          actor_token:
            description: Token representing the identity of the acting party (delegation/impersonation).
            type: string
          actor_token_type:
            $ref: "#/components/schemas/TokenTypeURI"
          requested_token_type:
            $ref: "#/components/schemas/TokenTypeURI"
          audience:
            description: |
              RFC 8693-defined parameter (distinct from RFC 8707 `resource`).
              Logical name(s) of the target service(s). MAY appear multiple
              times in the form body — modeled here as array.
            items:
              type: string
            type: array
          scope:
            type: string
        required:
        - grant_type
        - subject_token
        - subject_token_type
      description: RFC 8693 §2.1.
    TokenTypeURI:
      enum:
      - urn:ietf:params:oauth:token-type:access_token
      - urn:ietf:params:oauth:token-type:refresh_token
      - urn:ietf:params:oauth:token-type:id_token
      - urn:ietf:params:oauth:token-type:saml1
      - urn:ietf:params:oauth:token-type:saml2
      - urn:ietf:params:oauth:token-type:jwt
      title: TokenTypeURI
      type: string
    TokenResponse:
      additionalProperties: true
      description: |
        Successful token response — RFC 6749 §5.1, with extensions:
        OIDC Core §3.1.3.3 adds `id_token`; RFC 8693 §2.2.1 adds
        `issued_token_type` (REQUIRED for token-exchange responses); RFC
        9396 §6 adds `authorization_details`. Returned with
        `Cache-Control: no-store` and `Pragma: no-cache` headers.
      example:
        access_token: access_token
        refresh_token: refresh_token
        issued_token_type: urn:ietf:params:oauth:token-type:access_token
        authorization_details:
        - identifier: identifier
          privileges:
          - privileges
          - privileges
          locations:
          - https://openapi-generator.tech
          - https://openapi-generator.tech
          type: type
          actions:
          - actions
          - actions
          datatypes:
          - datatypes
          - datatypes
        - identifier: identifier
          privileges:
          - privileges
          - privileges
          locations:
          - https://openapi-generator.tech
          - https://openapi-generator.tech
          type: type
          actions:
          - actions
          - actions
          datatypes:
          - datatypes
          - datatypes
        scope: scope
        id_token: id_token
        token_type: token_type
        expires_in: 1
      properties:
        access_token:
          description: |
            The access token issued. Format is implementation-defined: an
            opaque string (validated via introspection) or a JWT (RFC 9068
            — see `JWTAccessTokenClaims` for the decoded shape).
          type: string
        token_type:
          description: |
            Token presentation scheme. `Bearer` (RFC 6750) for unbound
            tokens, `DPoP` (RFC 9449) for sender-constrained tokens, or
            `N_A` for token-exchange responses where no usable access token
            is returned (RFC 8693 §2.2.1).
          type: string
        expires_in:
          description: Lifetime of the access token in seconds.
          minimum: 1
          type: integer
        refresh_token:
          description: |
            Optional refresh token (RFC 6749 §5.1). Per OAuth 2.1 §4.3.1
            and RFC 9700 §2.2.2, refresh tokens issued to public clients
            SHOULD be sender-constrained (DPoP) or rotated on every use.
          type: string
        scope:
          description: "Granted scope, if different from what was requested."
          type: string
        id_token:
          description: |
            OIDC: signed JWT identifying the authenticated user. The decoded
            payload conforms to `IDTokenClaims`. Issued only when the
            request scope contained `openid`.
          type: string
        issued_token_type:
          $ref: "#/components/schemas/TokenTypeURI"
        authorization_details:
          description: |
            RAR (RFC 9396 §6): granted authorization detail objects. MAY be
            a subset of those requested.
          items:
            $ref: "#/components/schemas/AuthorizationDetail"
          type: array
      required:
      - access_token
      - token_type
      title: TokenResponse
    ErrorResponse:
      additionalProperties: true
      description: |
        Standard OAuth error response shape (RFC 6749 §5.2). Spec extensions
        contribute additional error codes — the `error` enum below is the
        union of all registered values from this spec's covered RFCs.
      example:
        error_description: error_description
        state: state
        error: invalid_request
        error_uri: https://openapi-generator.tech
      properties:
        error:
          description: Single ASCII error code from the IANA OAuth Extensions Error
            Registry.
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          - access_denied
          - unsupported_response_type
          - server_error
          - temporarily_unavailable
          - invalid_token
          - insufficient_scope
          - unsupported_token_type
          - authorization_pending
          - slow_down
          - expired_token
          - invalid_target
          - invalid_request_uri
          - invalid_request_object
          - request_not_supported
          - request_uri_not_supported
          - invalid_authorization_details
          - invalid_dpop_proof
          - use_dpop_nonce
          - interaction_required
          - login_required
          - account_selection_required
          - consent_required
          - registration_not_supported
          type: string
        error_description:
          description: |
            Human-readable text providing additional information for the
            developer. ASCII printable characters only per RFC 6749 §5.2;
            no `"`, `\`, or non-ASCII Unicode.
          pattern: "^[\\x20-\\x21\\x23-\\x5B\\x5D-\\x7E]*$"
          type: string
        error_uri:
          description: URI of a human-readable web page describing the error.
          format: uri
          type: string
        state:
          description: |
            Echoed `state` from the original authorization request, when
            applicable (e.g. authorization-endpoint redirect errors).
          type: string
      required:
      - error
      title: ErrorResponse
    DeviceAuthorizationRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - properties:
          client_id:
            type: string
          scope:
            description: Space-delimited list of requested scopes.
            type: string
        required:
        - client_id
      description: RFC 8628 §3.1.
    DeviceAuthorizationResponse:
      description: RFC 8628 §3.2
      example:
        user_code: user_code
        device_code: device_code
        interval: 6
        verification_uri_complete: https://openapi-generator.tech
        verification_uri: https://openapi-generator.tech
        expires_in: 0
      properties:
        device_code:
          description: Long opaque device verification code (kept secret by the client).
          title: device_code
          type: string
        user_code:
          description: "Short, human-typeable code shown to the user."
          title: user_code
          type: string
        verification_uri:
          description: End-user verification URI on the authorization server.
          format: uri
          title: verification_uri
          type: string
        verification_uri_complete:
          description: "Optional: URI with `user_code` already embedded (for QR codes)."
          format: uri
          title: verification_uri_complete
          type: string
        expires_in:
          description: Lifetime in seconds of `device_code` and `user_code`.
          title: expires_in
          type: integer
        interval:
          default: 5
          description: Minimum polling interval in seconds (default 5).
          title: interval
          type: integer
      required:
      - device_code
      - expires_in
      - user_code
      - verification_uri
      title: DeviceAuthorizationResponse
    PARRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - $ref: "#/components/schemas/ResourceIndicators"
      - properties:
          response_type:
            type: string
          client_id:
            type: string
          redirect_uri:
            format: uri
            type: string
          scope:
            type: string
          state:
            type: string
          code_challenge:
            maxLength: 128
            minLength: 43
            pattern: "^[A-Za-z0-9._~-]+$"
            type: string
          code_challenge_method:
            default: S256
            enum:
            - S256
            type: string
          nonce:
            type: string
          prompt:
            type: string
          login_hint:
            type: string
          max_age:
            minimum: 0
            type: integer
          ui_locales:
            type: string
          id_token_hint:
            type: string
          acr_values:
            type: string
          response_mode:
            type: string
          display:
            enum:
            - page
            - popup
            - touch
            - wap
            type: string
          claims:
            description: JSON-encoded claims request (OIDC Core §5.5).
            type: string
          authorization_details:
            description: JSON-encoded array of AuthorizationDetail (RFC 9396).
            type: string
          request:
            description: "Optional signed JWT request object (JAR, RFC 9101 §5)."
            type: string
          dpop_jkt:
            description: DPoP key thumbprint binding (RFC 9449 §10.1).
            type: string
        required:
        - client_id
        - code_challenge
        - code_challenge_method
        - response_type
      description: |
        All parameters of an `/authorize` request, POSTed as a form body to
        `/par` per RFC 9126 §2.1. Per §2.1 the body MUST NOT contain
        `request_uri` (the request_uri is what `/par` returns, not what it
        accepts). PKCE `code_challenge` is REQUIRED to maintain parity with
        `/authorize` under OAuth 2.1.
    PARResponse:
      description: |
        RFC 9126 §2.2 — returned with HTTP 201 Created and a
        `Cache-Control: no-store` header.
      example:
        expires_in: 52
        request_uri: https://openapi-generator.tech
      properties:
        request_uri:
          description: |
            Reference URI to be passed to `/authorize` in the `request_uri`
            query parameter. MUST start with the URN prefix
            `urn:ietf:params:oauth:request_uri:` per RFC 9126 §2.2.
          format: uri
          pattern: ^urn:ietf:params:oauth:request_uri:.+$
          title: request_uri
          type: string
        expires_in:
          description: |
            Lifetime in seconds of the `request_uri`. Typical range is
            5-600 seconds per RFC 9126 §2.2 guidance.
          maximum: 600
          minimum: 5
          title: expires_in
          type: integer
      required:
      - expires_in
      - request_uri
      title: PARResponse
    IntrospectionRequest:
      allOf:
      - $ref: "#/components/schemas/ClientAuthFields"
      - properties:
          token:
            description: The token to introspect (access or refresh token).
            type: string
          token_type_hint:
            description: |
              Hint to the AS about the type of token being introspected.
              Values come from the IANA OAuth Token Type Hint registry
              (RFC 7009 §4.1.2); the schema is kept open rather than a
              closed enum so future registrations work without spec churn.
            type: string
        required:
        - token
    IntrospectionResponse:
      additionalProperties: true
      description: |
        RFC 7662 §2.2. Always returned with HTTP 200, even for inactive
        tokens (then only `{"active": false}` is included). Open to
        registered extension members per §2.2 — `cnf` (RFC 7800), DPoP
        binding (RFC 9449), `authorization_details` (RFC 9396 §9), etc.
      example:
        sub: sub
        iss: iss
        active: true
        token_type: token_type
        client_id: client_id
        aud: null
        nbf: 1.4658129805029452
        authorization_details:
        - identifier: identifier
          privileges:
          - privileges
          - privileges
          locations:
          - https://openapi-generator.tech
          - https://openapi-generator.tech
          type: type
          actions:
          - actions
          - actions
          datatypes:
          - datatypes
          - datatypes
        - identifier: identifier
          privileges:
          - privileges
          - privileges
          locations:
          - https://openapi-generator.tech
          - https://openapi-generator.tech
          type: type
          actions:
          - actions
          - actions
          datatypes:
          - datatypes
