openapi: 3.1.0
info:
  title: OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI Specification
  version: 1.0.0
  summary: |
    Vendor-agnostic OpenAPI 3.1 description of the OAuth 2.0 / OpenID Connect
    authorization-server protocol surface, derived directly from IETF RFCs and the
    OpenID Foundation specifications. Defaults follow OAuth 2.1.
  description: |
    # OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI

    This specification describes the HTTP surface of an OAuth 2.0 / OpenID Connect
    authorization server in a vendor-neutral way. Every endpoint and field is
    cross-referenced to the source RFC or specification section.

    ## Covered specifications

    | Spec | Year | Subject |
    |---|---|---|
    | RFC 6749 | 2012 | OAuth 2.0 Authorization Framework |
    | RFC 6750 | 2012 | Bearer Token Usage |
    | RFC 7009 | 2013 | Token Revocation |
    | RFC 7517 | 2015 | JSON Web Key (JWK / JWKS) |
    | RFC 7519 | 2015 | JSON Web Token (JWT) |
    | RFC 7636 | 2015 | PKCE — Proof Key for Code Exchange |
    | RFC 7662 | 2015 | Token Introspection |
    | RFC 8414 | 2018 | Authorization Server Metadata |
    | RFC 8628 | 2019 | Device Authorization Grant |
    | RFC 8693 | 2020 | Token Exchange |
    | RFC 9068 | 2021 | JWT Profile for OAuth 2.0 Access Tokens |
    | RFC 9126 | 2021 | Pushed Authorization Requests (PAR) |
    | RFC 9396 | 2023 | Rich Authorization Requests (RAR) |
    | RFC 9449 | 2023 | DPoP — Demonstrating Proof of Possession |
    | RFC 9700 | 2025 | OAuth 2.0 Security Best Current Practice |
    | OAuth 2.1 (draft) | ongoing | Consolidated modern best practices |
    | OIDC Core 1.0 | 2014 | OpenID Connect identity layer |
    | OIDC Discovery 1.0 | 2014 | `.well-known/openid-configuration` schema |

    ## Modeling notes

    - **`/authorize` is browser-driven.** OpenAPI cannot precisely model 302 redirects
      to a client-controlled `redirect_uri` followed by HTML consent. The parameters
      and redirect semantics are described, but the response body is an approximation.
      The exact behavior is in RFC 6749 §4.1.2.

    - **`/token` uses a `grant_type` discriminator.** Per RFC 6749 §3.2, all grants
      POST to one endpoint and are dispatched by the `grant_type` form field. This
      spec uses `oneOf` + discriminator. Tooling without discriminator support may
      need to flatten the schema.

    - **OAuth 2.1 defaults are applied.** PKCE is mandatory for all public clients;
      Implicit (`response_type=token`) and Resource Owner Password (`grant_type=password`)
      grants are excluded as they are deprecated by OAuth 2.1.

    - **DPoP is supported via a request header.** The `DPoP` header is documented on
      relevant endpoints; the proof JWT itself is not modeled as a body schema.

  contact:
    name: oauth-openapi project
    url: https://github.com/kenanhancer/oauth-openapi
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/

externalDocs:
  description: OAuth 2.1 working draft (the primary modern reference)
  url: https://datatracker.ietf.org/doc/draft-ietf-oauth-v2-1/

servers:
  - url: 'https://{issuer}'
    description: Authorization server, identified by its issuer URL
    variables:
      issuer:
        default: as.example.com
        description: |
          Hostname of the OAuth 2.0 / OIDC issuer. The exact path layout under this
          host is vendor-specific; use the discovery endpoints to obtain canonical
          URLs at runtime.

tags:
  - name: Core
    description: RFC 6749 endpoints — authorize and token
  - name: Token Lifecycle
    description: RFC 7009 (revoke) + RFC 7662 (introspect)
  - name: Device Flow
    description: RFC 8628
  - name: PAR
    description: RFC 9126 — Pushed Authorization Requests
  - name: OpenID Connect
    description: OIDC Core — UserInfo
  - name: Discovery
    description: 'RFC 8414 + OIDC Discovery — `.well-known` metadata'
  - name: JWKS
    description: RFC 7517 — JSON Web Key Set

paths:

  # =========================================================================
  # /authorize — RFC 6749 §3.1 / §4.1.1
  # =========================================================================
  /authorize:
    get:
      tags: [Core]
      operationId: authorize
      summary: Authorization endpoint
      description: |
        Initiates a browser-driven authorization request. The user-agent is
        navigated to this URL; the server authenticates the resource owner and
        obtains consent, then redirects the user-agent back to `redirect_uri`
        with a `code` (success) or an `error`.

        Under OAuth 2.1 only `response_type=code` is permitted (Implicit is
        deprecated). PKCE (`code_challenge`) is mandatory.
      externalDocs:
        description: RFC 6749 §4.1.1, OIDC Core §3.1.2.1
        url: https://datatracker.ietf.org/doc/html/rfc6749#section-4.1.1
      parameters:
        - $ref: '#/components/parameters/ResponseType'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/RedirectUri'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/State'
        - $ref: '#/components/parameters/CodeChallenge'
        - $ref: '#/components/parameters/CodeChallengeMethod'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Prompt'
        - $ref: '#/components/parameters/LoginHint'
        - $ref: '#/components/parameters/MaxAge'
        - $ref: '#/components/parameters/AcrValues'
        - $ref: '#/components/parameters/ResponseMode'
        - $ref: '#/components/parameters/RequestUri'
        - $ref: '#/components/parameters/AuthorizationDetails'
        - $ref: '#/components/parameters/Resource'
        # OIDC Core §3.1.2.1 (incl. mandatory-to-implement §15.1)
        - $ref: '#/components/parameters/Display'
        - $ref: '#/components/parameters/UILocales'
        - $ref: '#/components/parameters/ClaimsLocales'
        - $ref: '#/components/parameters/IDTokenHint'
        - $ref: '#/components/parameters/Claims'
        # OIDC Core §6 / RFC 9101 (JAR)
        - $ref: '#/components/parameters/Request'
        # RFC 9449 §10 (early DPoP binding at the authorization endpoint)
        - $ref: '#/components/parameters/DPoPJKT'
      responses:
        '302':
          description: |
            User-agent redirect back to `redirect_uri`. The `Location`
            header carries:
            - on success: `code`, `state`, plus `iss` (RFC 9207) when the AS
              advertises `authorization_response_iss_parameter_supported`.
              For OIDC Hybrid (`response_type=code id_token`) it also carries
              `id_token` in the URL fragment.
            - on failure: `error`, `error_description`, `error_uri`, `state`,
              plus `iss` per RFC 9207.

            OAuth 2.1 §7.5.3 / RFC 9700 §4.12 RECOMMEND HTTP 303 over 302
            and PROHIBIT 307; both are modeled as alternative status codes.
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
                examples:
                  - 'https://client.example.com/cb?code=SplxlOBeZQQYbYS6WxSbIA&state=xyz&iss=https%3A%2F%2Fas.example.com'
                  - 'https://client.example.com/cb?error=access_denied&state=xyz&iss=https%3A%2F%2Fas.example.com'
        '303':
          description: 'Same as 302; RECOMMENDED status code per OAuth 2.1 §7.5.3.'
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
        '200':
          description: HTML consent or authentication page (intermediate state)
          content:
            text/html:
              schema:
                type: string
        '400':
          description: |
            Non-redirecting error. Per RFC 6749 §4.1.2.1, when `redirect_uri`
            is missing, malformed, or does not match a registered URI, the
            AS MUST NOT redirect to it; instead it returns an HTML error page.
            Also returned for malformed `client_id`.
          content:
            text/html:
              schema:
                type: string

  # =========================================================================
  # /token — RFC 6749 §3.2
  # =========================================================================
  /token:
    post:
      tags: [Core]
      operationId: token
      summary: Token endpoint (all grants)
      description: |
        Issues access tokens. The `grant_type` form field selects the grant. All
        grants supported by OAuth 2.1 are modeled here:

        - `authorization_code` — RFC 6749 §4.1.3 (with PKCE per RFC 7636)
        - `client_credentials` — RFC 6749 §4.4
        - `refresh_token` — RFC 6749 §6
        - `urn:ietf:params:oauth:grant-type:device_code` — RFC 8628 §3.4
        - `urn:ietf:params:oauth:grant-type:jwt-bearer` — RFC 7523
        - `urn:ietf:params:oauth:grant-type:token-exchange` — RFC 8693

        The deprecated `password` and `implicit` grants are intentionally
        omitted (per OAuth 2.1).
      externalDocs:
        description: RFC 6749 §3.2
        url: https://datatracker.ietf.org/doc/html/rfc6749#section-3.2
      parameters:
        - $ref: '#/components/parameters/DPoPHeader'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Access token issued
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            DPoP-Nonce:
              $ref: '#/components/headers/DPoPNonce'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/OAuthErrorWithDPoPNonce'
        '401':
          $ref: '#/components/responses/ClientAuthError'
      security:
        - clientSecretBasic: []
        - clientSecretPost: []
        - clientAssertion: []
        - mtls: []
        - none: []

  # =========================================================================
  # /revoke — RFC 7009
  # =========================================================================
  /revoke:
    post:
      tags: [Token Lifecycle]
      operationId: revoke
      summary: Token revocation
      description: |
        Revokes an access or refresh token before its natural expiry. Per
        RFC 7009 §2.1, when a refresh token is revoked the AS SHOULD also
        invalidate all access tokens issued under the same authorization
        grant. (Cascade is from refresh → access; not the other direction.)
        A successful revocation always returns HTTP 200 with an empty body
        — even when the token is unknown to the server.
      externalDocs:
        description: RFC 7009 §2
        url: https://datatracker.ietf.org/doc/html/rfc7009#section-2
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RevocationRequest'
      responses:
        '200':
          description: Revocation accepted (returned even if the token was unknown).
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
        '400':
          $ref: '#/components/responses/OAuthError'
        '401':
          $ref: '#/components/responses/ClientAuthError'
      security:
        - clientSecretBasic: []
        - clientSecretPost: []
        - clientAssertion: []
        - mtls: []
        - none: []

  # =========================================================================
  # /introspect — RFC 7662
  # =========================================================================
  /introspect:
    post:
      tags: [Token Lifecycle]
      operationId: introspect
      summary: Token introspection
      description: |
        A protected resource queries the authorization server about the
        meta-information of a token (active state, scopes, expiry, subject).
        Critical for opaque (non-JWT) tokens. JWT tokens can usually be
        validated locally by verifying the signature against the JWKS.
      externalDocs:
        description: RFC 7662 §2
        url: https://datatracker.ietf.org/doc/html/rfc7662#section-2
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IntrospectionRequest'
      responses:
        '200':
          description: Introspection result (always 200, even for inactive tokens).
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'
            application/jwt:
              schema:
                $ref: '#/components/schemas/JWT'
                description: |
                  Signed/encrypted JWT containing the same claims, per the
                  JWT Response for OAuth Token Introspection draft (used
                  by FAPI 2.0).
        '400':
          $ref: '#/components/responses/OAuthError'
        '401':
          $ref: '#/components/responses/IntrospectionAuthError'
      security:
        - clientSecretBasic: []
        - clientSecretPost: []
        - clientAssertion: []
        - mtls: []
        - bearerAuth: []

  # =========================================================================
  # /device_authorization — RFC 8628
  # =========================================================================
  /device_authorization:
    post:
      tags: [Device Flow]
      operationId: deviceAuthorization
      summary: Device Authorization Endpoint (RFC 8628)
      description: |
        Initiates the Device Authorization Grant. The client receives a
        `device_code` and `user_code`; the user is instructed to visit
        `verification_uri` on a second device and enter the `user_code`.
        The client then polls `/token` with
        `grant_type=urn:ietf:params:oauth:grant-type:device_code` until the
        user authorizes or `expires_in` elapses.

        Polling protocol (RFC 8628 §3.5): the AS may return `slow_down` to
        increase the polling interval by 5 seconds, or `authorization_pending`
        while the user is still consenting. Clients MUST stop polling on any
        non-pending error (`access_denied`, `expired_token`).

        The `device_code` MUST NOT be displayed to the end user.
        The `user_code` is per §6.1 displayed to the user; servers SHOULD
        accept dashed and case-insensitive variants.
      externalDocs:
        description: RFC 8628 §3.1
        url: https://datatracker.ietf.org/doc/html/rfc8628#section-3.1
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeviceAuthorizationRequest'
      responses:
        '200':
          description: Device authorization issued.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthorizationResponse'
        '400':
          $ref: '#/components/responses/OAuthError'
        '401':
          $ref: '#/components/responses/ClientAuthError'
      security:
        - clientSecretBasic: []
        - clientSecretPost: []
        - clientAssertion: []
        - mtls: []
        - none: []

  # =========================================================================
  # /par — RFC 9126
  # =========================================================================
  /par:
    post:
      tags: [PAR]
      operationId: pushedAuthorizationRequest
      summary: Pushed Authorization Request (RFC 9126)
      description: |
        Pushes the authorization request parameters to the server before the
        user-agent redirect. The server returns a short-lived `request_uri`
        that the client then passes (instead of the full request) to
        `/authorize`. This avoids leaking parameters via browser history,
        keeps URLs short, and enables integrity protection.

        Per §2.1, the request body MUST NOT contain a `request_uri` parameter.
        Per §4, when `/authorize` is reached via a PAR-issued `request_uri`,
        only `client_id` and `request_uri` are sent — all other parameters
        come from the pushed body.
      externalDocs:
        description: RFC 9126 §2
        url: https://datatracker.ietf.org/doc/html/rfc9126#section-2
      parameters:
        - $ref: '#/components/parameters/DPoPHeader'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PARRequest'
      responses:
        '201':
          description: Pushed authorization request accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            DPoP-Nonce:
              $ref: '#/components/headers/DPoPNonce'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PARResponse'
        '400':
          $ref: '#/components/responses/OAuthErrorWithDPoPNonce'
        '401':
          $ref: '#/components/responses/ClientAuthError'
        '405':
          description: 'Method Not Allowed (RFC 9126 §2.3) — only POST is permitted.'
        '413':
          description: 'Payload Too Large (RFC 9126 §2.3) — request exceeds AS-defined limit.'
        '429':
          description: 'Too Many Requests (RFC 9126 §2.3) — rate limit exceeded.'
      security:
        - clientSecretBasic: []
        - clientSecretPost: []
        - clientAssertion: []
        - mtls: []
        - none: []

  # =========================================================================
  # /userinfo — OIDC Core §5.3
  # =========================================================================
  /userinfo:
    get:
      tags: [OpenID Connect]
      operationId: userinfoGet
      summary: UserInfo endpoint (GET, OIDC)
      description: |
        Returns claims about the authenticated end-user. Requires a valid
        OIDC access token in the `Authorization` header (Bearer or DPoP).
        When the response is `application/jwt` (signed/encrypted), the JWT
        also carries `iss` and `aud` claims (OIDC Core §5.3.2).
      externalDocs:
        description: OIDC Core §5.3
        url: https://openid.net/specs/openid-connect-core-1_0.html#UserInfo
      parameters:
        - $ref: '#/components/parameters/DPoPHeader'
      responses:
        '200':
          description: UserInfo claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
            application/jwt:
              schema:
                $ref: '#/components/schemas/UserInfoSignedResponse'
        '401':
          $ref: '#/components/responses/ProtectedResourceError'
        '403':
          $ref: '#/components/responses/ProtectedResourceError'
      security:
        - bearerAuth: []
        - dpop: []
    post:
      tags: [OpenID Connect]
      operationId: userinfoPost
      summary: UserInfo endpoint (POST, OIDC)
      description: |
        Same semantics as GET; some clients prefer POST per OIDC Core §5.3.1.
        Either `application/x-www-form-urlencoded` (with `access_token` form
        field) or an Authorization header.
      externalDocs:
        description: OIDC Core §5.3.1
        url: https://openid.net/specs/openid-connect-core-1_0.html#UserInfoRequest
      parameters:
        - $ref: '#/components/parameters/DPoPHeader'
      responses:
        '200':
          description: UserInfo claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
            application/jwt:
              schema:
                $ref: '#/components/schemas/UserInfoSignedResponse'
        '401':
          $ref: '#/components/responses/ProtectedResourceError'
        '403':
          $ref: '#/components/responses/ProtectedResourceError'
      security:
        - bearerAuth: []
        - dpop: []

  # =========================================================================
  # /jwks — RFC 7517
  # =========================================================================
  /jwks:
    get:
      tags: [JWKS]
      operationId: jwks
      summary: JSON Web Key Set
      description: |
        Returns the public keys used by this issuer to sign tokens (and
        encrypt requests, when applicable). Clients fetch this to verify
        JWT signatures locally. The actual path is announced by
        `jwks_uri` in the discovery document.
      externalDocs:
        description: RFC 7517 §5
        url: https://datatracker.ietf.org/doc/html/rfc7517#section-5
      responses:
        '200':
          description: JSON Web Key Set
          content:
            application/jwk-set+json:
              schema:
                $ref: '#/components/schemas/JWKS'
              # Per RFC 7517 §8.5.2, application/jwk-set+json is the
              # registered media type for a JWK Set. application/json is
              # also accepted for backward compatibility.
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'

  # =========================================================================
  # Discovery — OIDC Discovery 1.0
  # =========================================================================
  /.well-known/openid-configuration:
    get:
      tags: [Discovery]
      operationId: openidConfiguration
      summary: OIDC discovery metadata
      description: |
        Standardized discovery endpoint published by every OpenID Connect
        provider. The response describes all endpoints, supported flows,
        scopes, claims, signing algorithms, and capabilities.

        This is the **only path that is truly standardized across OIDC
        providers** — all other endpoint URLs are vendor-defined and must be
        read from this document.
      externalDocs:
        description: OIDC Discovery 1.0 §3
        url: https://openid.net/specs/openid-connect-discovery-1_0.html#ProviderMetadata
      responses:
        '200':
          description: Provider metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDProviderMetadata'

  # =========================================================================
  # Discovery — RFC 8414 (OAuth without OIDC)
  # =========================================================================
  /.well-known/oauth-authorization-server:
    get:
      tags: [Discovery]
      operationId: authorizationServerMetadata
      summary: OAuth 2.0 authorization-server metadata (RFC 8414)
      description: |
        Equivalent to the OIDC discovery document for plain OAuth 2.0
        servers that do not implement OpenID Connect. The response shape
        is a strict subset of the OIDC discovery document.
      externalDocs:
        description: RFC 8414 §3
        url: https://datatracker.ietf.org/doc/html/rfc8414#section-3
      responses:
        '200':
          description: Authorization server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthServerMetadata'

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Reusable parameters (mostly for /authorize)
  # ---------------------------------------------------------------------------
  parameters:
    ResponseType:
      name: response_type
      in: query
      required: true
      description: |
        OAuth 2.1 §10.1 permits only `code` (the Authorization Code grant).
        OIDC Core §3.1.2.1 also defines `id_token` and `code id_token` for
        OIDC Hybrid Flow. The hybrid front-channel-token variants
        `code token` and `code id_token token` are intentionally excluded
        per OAuth 2.1 / RFC 9700 §2.1.2 because front-channel access tokens
        are insecure (browser history leakage).
      schema:
        type: string
        enum:
          - code
          - id_token
          - 'code id_token'

    ClientId:
      name: client_id
      in: query
      required: true
      description: The client identifier issued at registration time (RFC 6749 §2.2).
      schema:
        type: string

    RedirectUri:
      name: redirect_uri
      in: query
      required: false
      description: |
        Where the user-agent is redirected after authorization. Per OAuth
        2.1 §2.3.1 and RFC 9700 §4.1.3, the AS MUST compare against
        registered URIs **using exact-string matching**, not pattern
        matching. REQUIRED when the client has more than one registered
        redirect URI; OPTIONAL otherwise. Per RFC 6749 §4.1.2.1, when
        invalid, the AS MUST NOT redirect — it returns an HTML error page
        (modeled as the 400 response on `/authorize`).
      schema:
        type: string
        format: uri

    Scope:
      name: scope
      in: query
      required: false
      description: |
        Space-delimited list of scopes. For OIDC, MUST include `openid` to
        request an ID token. Standard OIDC scopes: `profile`, `email`,
        `address`, `phone`, `offline_access`. Per RFC 6749 §3.3 ABNF, each
        scope token is `1*( %x21 / %x23-5B / %x5D-7E )` — printable ASCII
        excluding `"` and `\`; tokens are separated by single SP characters.
      schema:
        type: string
        pattern: '^[\x21\x23-\x5B\x5D-\x7E]+( [\x21\x23-\x5B\x5D-\x7E]+)*$'
        examples:
          - openid
          - 'openid profile email'
          - 'openid offline_access'

    State:
      name: state
      in: query
      required: false
      description: |
        Opaque value used by the client to maintain state and prevent CSRF.
        The server returns it unchanged in the redirect. RFC 6749 §10.12.
      schema:
        type: string

    CodeChallenge:
      name: code_challenge
      in: query
      required: true
      description: |
        PKCE challenge — `BASE64URL(SHA256(code_verifier))` for the `S256`
        method. 43-128 characters from the unreserved set
        `[A-Z] / [a-z] / [0-9] / "-" / "." / "_" / "~"`.
        **Mandatory in OAuth 2.1 for all clients.** RFC 7636 §4.2.
      schema:
        type: string
        minLength: 43
        maxLength: 128
        pattern: '^[A-Za-z0-9._~-]+$'

    CodeChallengeMethod:
      name: code_challenge_method
      in: query
      required: true
      description: |
        Always `S256` per OAuth 2.1 §4.1.1 and RFC 9700 §4.8. The legacy
        `plain` method (RFC 7636 §4.4) is intentionally omitted; clients
        and servers compliant with OAuth 2.1 MUST use S256 only.
      schema:
        type: string
        enum: [S256]
        default: S256

    Nonce:
      name: nonce
      in: query
      required: false
      description: |
        OIDC: opaque random value bound to the ID token's `nonce` claim,
        for replay protection. OIDC Core §3.1.2.1.
      schema:
        type: string

    Prompt:
      name: prompt
      in: query
      required: false
      description: |
        OIDC: how the auth server should prompt the user. Space-delimited.
      schema:
        type: string
        enum:
          - none
          - login
          - consent
          - select_account

    LoginHint:
      name: login_hint
      in: query
      required: false
      description: 'OIDC: hint to the auth server about the login identifier (e.g. e-mail).'
      schema:
        type: string

    MaxAge:
      name: max_age
      in: query
      required: false
      description: 'OIDC: maximum allowed elapsed time since last authentication, in seconds.'
      schema:
        type: integer
        minimum: 0

    AcrValues:
      name: acr_values
      in: query
      required: false
      description: 'OIDC: requested Authentication Context Class Reference values, space-separated.'
      schema:
        type: string

    ResponseMode:
      name: response_mode
      in: query
      required: false
      description: |
        Mechanism for delivering the authorization response. `query`,
        `fragment`, `form_post` (OAuth 2.0 Form Post Response Mode).
      schema:
        type: string
        enum: [query, fragment, form_post]

    RequestUri:
      name: request_uri
      in: query
      required: false
      description: |
        Reference to a request previously submitted via PAR (RFC 9126 §4).
        When present, takes precedence over individual query parameters.
      schema:
        type: string
        format: uri

    AuthorizationDetails:
      name: authorization_details
      in: query
      required: false
      description: |
        Rich Authorization Requests (RAR) — JSON-encoded array of
        authorization detail objects. RFC 9396.
      schema:
        type: string

    Resource:
      name: resource
      in: query
      required: false
      description: |
        Indicator of the protected resource(s) for which authorization is
        requested. MUST be an absolute URI without a fragment component.
        MAY appear multiple times to request audience for multiple
        resources. RFC 8707 §2.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          format: uri

    Display:
      name: display
      in: query
      required: false
      description: |
        OIDC: how the AS should display the authentication and consent UI.
        OIDC Core §3.1.2.1. Mandatory-to-implement (§15.1).
      schema:
        type: string
        enum: [page, popup, touch, wap]

    UILocales:
      name: ui_locales
      in: query
      required: false
      description: |
        OIDC: end-user UI language(s), space-separated BCP47 tags
        (e.g. `fr-CA fr en`). Mandatory-to-implement (§15.1).
      schema:
        type: string
        examples: ['en', 'fr-CA fr en']

    ClaimsLocales:
      name: claims_locales
      in: query
      required: false
      description: |
        OIDC: preferred languages for Claims being returned, space-separated
        BCP47 tags. OIDC Core §5.2. Mandatory-to-implement (§15.1).
      schema:
        type: string

    IDTokenHint:
      name: id_token_hint
      in: query
      required: false
      description: |
        OIDC: previously issued ID Token passed as a hint about the user's
        current or past authenticated session. OIDC Core §3.1.2.1.
      schema:
        type: string

    Claims:
      name: claims
      in: query
      required: false
      description: |
        OIDC: JSON-encoded object describing specific Claims being requested
        for delivery in the ID Token and/or UserInfo response. OIDC Core §5.5.
      schema:
        type: string
        description: JSON-encoded object

    Request:
      name: request
      in: query
      required: false
      description: |
        OIDC / RFC 9101 (JAR): a self-contained JWT containing the full
        authorization request as claims. Mutually exclusive with
        `request_uri`. OIDC Core §6.
      schema:
        type: string
        description: A signed (and optionally encrypted) JWT

    DPoPJKT:
      name: dpop_jkt
      in: query
      required: false
      description: |
        DPoP key thumbprint to bind the resulting authorization code to a
        specific DPoP key, even before the token request. RFC 9449 §10.1.
      schema:
        type: string

    DPoPHeader:
      name: DPoP
      in: header
      required: false
      description: |
        DPoP proof JWT (RFC 9449 §4). Required on `/token`, `/par`,
        protected resources, and `/userinfo` whenever DPoP-bound access
        tokens are in use. Header value is a single compact-serialized JWT
        with `typ=dpop+jwt`, `alg`, `jwk` in the header and `jti`, `htm`,
        `htu`, `iat` claims (plus `ath` at resource servers and `nonce`
        when the AS issues a DPoP-Nonce challenge).
      schema:
        type: string

  # ---------------------------------------------------------------------------
  # Reusable headers
  # ---------------------------------------------------------------------------
  headers:
    CacheControlNoStore:
      description: Required on token-bearing JSON responses (RFC 6749 §5.1).
      schema:
        type: string
        const: 'no-store'
    PragmaNoCache:
      description: HTTP/1.0 cache directive paired with Cache-Control (RFC 6749 §5.1).
      schema:
        type: string
        const: 'no-cache'
    WWWAuthenticateBearerDPoP:
      description: |
        Combined authentication challenge from a protected resource that
        accepts BOTH Bearer (RFC 6750 §3) and DPoP-bound (RFC 9449 §7)
        access tokens. RFC 9110 §11.6.1 permits a single response to
        advertise multiple schemes in one header, and RFC 9449 §7.2 governs
        how error information is distributed across them:
          - no credentials sent -> challenge carries no error info (Fig 17)
          - scheme unambiguous   -> error info on the used scheme  (Fig 18)
          - scheme ambiguous     -> error info on both schemes     (Fig 19)
        The DPoP `algs` parameter lists the JWS algorithms the resource
        accepts for DPoP proofs (RFC 9449 §5). The standalone Bearer format
        (RFC 6750 §3) is the same header without the trailing `DPoP` scheme.
      schema:
        type: string
        examples:
          - 'Bearer, DPoP algs="ES256 PS256"'
          - 'Bearer error="invalid_token", error_description="The access token expired", DPoP algs="ES256 EdDSA"'
    WWWAuthenticateBasic:
      description: |
        HTTP Basic challenge returned on a 401 from a client-authenticated
        endpoint when the client used the `Authorization` header and the
        credentials were invalid. RFC 6749 §5.2 REQUIRES the AS to emit a
        `WWW-Authenticate` header matching the scheme the client used; for
        `client_secret_basic` that scheme is Basic (RFC 7617).
      schema:
        type: string
        examples:
          - 'Basic realm="as.example.com"'
          - 'Basic realm="as.example.com", error="invalid_client"'
    WWWAuthenticateBasicBearer:
      description: |
        Combined challenge for the introspection endpoint, which authenticates
        callers EITHER with client credentials (Basic, RFC 6749 §5.2) OR with
        the protected resource's own bearer token (RFC 6750 §3). RFC 7662 §2.3
        routes the failure to whichever was used, and RFC 9110 §11.6.1 permits
        advertising both schemes in one header. DPoP is intentionally absent —
        the introspection endpoint does not accept DPoP-bound tokens.
      schema:
        type: string
        examples:
          - 'Basic realm="as.example.com", Bearer'
          - 'Bearer error="invalid_token", error_description="The access token expired"'
    DPoPNonce:
      description: |
        Server-issued nonce that MUST be echoed in the next DPoP proof's
        `nonce` claim (RFC 9449 §8). Servers MAY rotate the nonce on every
        response.
      schema:
        type: string

  # ---------------------------------------------------------------------------
  # Reusable responses
  # ---------------------------------------------------------------------------
  responses:
    OAuthError:
      description: Standard OAuth 2.0 error response (RFC 6749 §5.2)
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    OAuthErrorWithDPoPNonce:
      description: |
        OAuth 2.0 error (RFC 6749 §5.2) at a DPoP-capable endpoint. When the
        AS requires a DPoP nonce it answers `use_dpop_nonce` with HTTP 400 AND
        a `DPoP-Nonce` header carrying the nonce to use in the retried proof
        (RFC 9449 §8). The header is absent on other 400 errors.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        DPoP-Nonce:
          $ref: '#/components/headers/DPoPNonce'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ProtectedResourceError:
      description: |
        Authentication error from a protected resource that accepts both
        Bearer and DPoP-bound access tokens (RFC 6750 §3, RFC 9449 §7.2).
        The `WWW-Authenticate` header carries a combined challenge offering
        both schemes (RFC 9110 §11.6.1); `DPoP-Nonce` is returned when the
        resource requires the client to retry the DPoP proof with a
        server-provided nonce (RFC 9449 §8, §9).
      headers:
        WWW-Authenticate:
          $ref: '#/components/headers/WWWAuthenticateBearerDPoP'
        DPoP-Nonce:
          $ref: '#/components/headers/DPoPNonce'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ClientAuthError:
      description: |
        Client authentication failed (`invalid_client`) on a token-family
        endpoint. RFC 6749 §5.2: when the client authenticated via the
        `Authorization` header, the AS MUST return 401 with a matching
        `WWW-Authenticate` challenge. Used for HTTP 401 only — a malformed
        request (HTTP 400) uses `OAuthError`, which needs no challenge.
      headers:
        WWW-Authenticate:
          $ref: '#/components/headers/WWWAuthenticateBasic'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IntrospectionAuthError:
      description: |
        Authentication failed at the introspection endpoint. Per RFC 7662 §2.3
        the AS returns 401 with a `WWW-Authenticate` challenge for the scheme
        the caller used — Basic for client credentials (RFC 6749 §5.2) or
        Bearer for a protected-resource access token (RFC 6750 §3).
      headers:
        WWW-Authenticate:
          $ref: '#/components/headers/WWWAuthenticateBasicBearer'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # -----------------------------------------------------------------
    # Token request — discriminated by grant_type (RFC 6749 §3.2)
    # -----------------------------------------------------------------
    TokenRequest:
      description: |
        Discriminated union of all supported token-request bodies, keyed by
        `grant_type` per RFC 6749 §3.2.
      oneOf:
        - $ref: '#/components/schemas/AuthorizationCodeTokenRequest'
        - $ref: '#/components/schemas/ClientCredentialsTokenRequest'
        - $ref: '#/components/schemas/RefreshTokenRequest'
        - $ref: '#/components/schemas/DeviceCodeTokenRequest'
        - $ref: '#/components/schemas/JWTBearerTokenRequest'
        - $ref: '#/components/schemas/TokenExchangeRequest'
      discriminator:
        propertyName: grant_type
        mapping:
          authorization_code: '#/components/schemas/AuthorizationCodeTokenRequest'
          client_credentials: '#/components/schemas/ClientCredentialsTokenRequest'
          refresh_token: '#/components/schemas/RefreshTokenRequest'
          'urn:ietf:params:oauth:grant-type:device_code': '#/components/schemas/DeviceCodeTokenRequest'
          'urn:ietf:params:oauth:grant-type:jwt-bearer': '#/components/schemas/JWTBearerTokenRequest'
          'urn:ietf:params:oauth:grant-type:token-exchange': '#/components/schemas/TokenExchangeRequest'

    # Reusable mixin: client authentication form fields (RFC 6749 §2.3, RFC 7523 §2.2).
    # Most token-endpoint-style requests can include these alongside their grant-specific fields.
    ClientAuthFields:
      type: object
      properties:
        client_id:
          type: string
          description: |
            REQUIRED for public clients (no client secret) and clients that
            authenticate via `client_assertion`. RFC 6749 §3.2.1.
        client_secret:
          type: string
          description: |
            Used with `client_id` for `client_secret_post` authentication.
            HTTP Basic (`client_secret_basic`) is preferred; this form-body
            variant is NOT RECOMMENDED per RFC 6749 §2.3.1.
        client_assertion:
          type: string
          description: |
            JWT bearing claims that authenticate the client. Used with
            `client_assertion_type` for `client_secret_jwt` or
            `private_key_jwt` authentication. RFC 7523 §2.2.
        client_assertion_type:
          type: string
          const: 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer'
          description: RFC 7523 §2.2.

    # Reusable mixin: RFC 8707 resource indicators. May repeat — model as array.
    ResourceIndicators:
      type: object
      properties:
        resource:
          type: array
          description: |
            Indicator(s) of the protected resource(s) for which the access
            token is requested. Each value MUST be an absolute URI without a
            fragment component. The parameter MAY be included multiple times
            in the underlying form-encoded body. RFC 8707.
          items:
            type: string
            format: uri

    # Reusable mixin: RFC 9396 §5 authorization_details on token requests.
    # Permitted on grants where the token endpoint is the first point of
    # client-resource-owner contact (client_credentials), or to narrow a
    # previous grant (refresh_token), and on token-exchange requests.
    AuthorizationDetailsField:
      type: object
      properties:
        authorization_details:
          type: string
          description: |
            JSON-encoded array of `AuthorizationDetail` objects (RFC 9396 §5).
            Sent as a string because the form-encoded body cannot carry
            structured JSON natively. The decoded value conforms to
            `AuthorizationDetail[]`.

    AuthorizationCodeTokenRequest:
      description: |
        RFC 6749 §4.1.3 with PKCE per RFC 7636 §4.5. Under OAuth 2.1 §10.2 the
        `redirect_uri` parameter is no longer sent at the token endpoint and
        is omitted from `required`.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - type: object
          required: [grant_type, code, code_verifier]
          properties:
            grant_type:
              type: string
              const: authorization_code
            code:
              type: string
              description: The authorization code received from `/authorize`.
            redirect_uri:
              type: string
              format: uri
              description: |
                OPTIONAL under OAuth 2.1 §10.2 (was REQUIRED in OAuth 2.0
                §4.1.3). When present, MUST match the `redirect_uri` used at
                `/authorize`. Some legacy AS implementations still require it.
            code_verifier:
              type: string
              minLength: 43
              maxLength: 128
              pattern: '^[A-Za-z0-9._~-]+$'
              description: |
                PKCE verifier (RFC 7636 §4.1). 43-128 chars from the
                unreserved set `[A-Z] / [a-z] / [0-9] / "-" / "." / "_" / "~"`.

    ClientCredentialsTokenRequest:
      description: RFC 6749 §4.4. Service-to-service grant, no end user.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - $ref: '#/components/schemas/AuthorizationDetailsField'
        - type: object
          required: [grant_type]
          properties:
            grant_type:
              type: string
              const: client_credentials
            scope:
              type: string
              description: Space-delimited list of requested scopes.
            audience:
              type: string
              description: |
                NON-STANDARD — vendor extension (e.g. Auth0 uses `audience`
                instead of RFC 8707 `resource`). Prefer `resource`. Kept here
                for compatibility with vendor servers.

    RefreshTokenRequest:
      description: |
        RFC 6749 §6. Per OAuth 2.1 §4.3.1 and RFC 9700 §2.2.2, refresh tokens
        issued to PUBLIC clients MUST be sender-constrained (DPoP) or rotated
        on every use; for confidential clients this is RECOMMENDED (they are
        already bound to the authenticating client).
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - $ref: '#/components/schemas/AuthorizationDetailsField'
        - type: object
          required: [grant_type, refresh_token]
          properties:
            grant_type:
              type: string
              const: refresh_token
            refresh_token:
              type: string
            scope:
              type: string
              description: |
                Optional. If present, MUST be no broader than the originally
                granted scope. RFC 8707: the `resource` parameter on a
                refresh request MUST be a subset of those originally granted.

    DeviceCodeTokenRequest:
      description: RFC 8628 §3.4. Polled by the client until the user authorizes.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - type: object
          required: [grant_type, device_code]
          properties:
            grant_type:
              type: string
              const: 'urn:ietf:params:oauth:grant-type:device_code'
            device_code:
              type: string
              description: |
                The opaque `device_code` from `/device_authorization`.
                MUST NOT be displayed to the end user.

    JWTBearerTokenRequest:
      description: |
        RFC 7523 §2.1. Note that the JWT itself authenticates the client in
        most uses, so `client_assertion_*` is usually omitted.
      allOf:
        - $ref: '#/components/schemas/ResourceIndicators'
        - type: object
          required: [grant_type, assertion]
          properties:
            grant_type:
              type: string
              const: 'urn:ietf:params:oauth:grant-type:jwt-bearer'
            assertion:
              type: string
              description: |
                Signed JWT bearer assertion. REQUIRED claims (RFC 7523 §3):
                `iss`, `sub`, `aud` (the AS token endpoint URL), `exp`.
                RECOMMENDED: `nbf`, `iat`, `jti`. The JWT MUST be digitally
                signed or MAC'd by the issuer and MUST be rejected by the AS
                if any required claim is missing or invalid.
            scope:
              type: string

    TokenExchangeRequest:
      description: RFC 8693 §2.1.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - $ref: '#/components/schemas/AuthorizationDetailsField'
        - type: object
          required: [grant_type, subject_token, subject_token_type]
          properties:
            grant_type:
              type: string
              const: 'urn:ietf:params:oauth:grant-type:token-exchange'
            subject_token:
              type: string
              description: Token representing the identity of the party on whose behalf the request is made.
            subject_token_type:
              $ref: '#/components/schemas/TokenTypeURI'
            actor_token:
              type: string
              description: Token representing the identity of the acting party (delegation/impersonation).
            actor_token_type:
              $ref: '#/components/schemas/TokenTypeURI'
              description: REQUIRED when `actor_token` is present.
            requested_token_type:
              $ref: '#/components/schemas/TokenTypeURI'
              description: Type of token the client is requesting be issued.
            audience:
              type: array
              description: |
                RFC 8693-defined parameter (distinct from RFC 8707 `resource`).
                Logical name(s) of the target service(s). MAY appear multiple
                times in the form body — modeled here as array.
              items:
                type: string
            scope:
              type: string

    # Token type URIs for RFC 8693 token exchange (§3).
    TokenTypeURI:
      type: string
      enum:
        - 'urn:ietf:params:oauth:token-type:access_token'
        - 'urn:ietf:params:oauth:token-type:refresh_token'
        - 'urn:ietf:params:oauth:token-type:id_token'
        - 'urn:ietf:params:oauth:token-type:saml1'
        - 'urn:ietf:params:oauth:token-type:saml2'
        - 'urn:ietf:params:oauth:token-type:jwt'

    # -----------------------------------------------------------------
    # Token response — RFC 6749 §5.1 + OIDC additions
    # -----------------------------------------------------------------
    TokenResponse:
      description: |
        Successful token response — RFC 6749 §5.1, with extensions:
        OIDC Core §3.1.3.3 adds `id_token`; RFC 8693 §2.2.1 adds
        `issued_token_type` (REQUIRED for token-exchange responses); RFC
        9396 §6 adds `authorization_details`. Returned with
        `Cache-Control: no-store` and `Pragma: no-cache` headers.
      type: object
      required: [access_token, token_type]
      additionalProperties: true
      properties:
        access_token:
          type: string
          description: |
            The access token issued. Format is implementation-defined: an
            opaque string (validated via introspection) or a JWT (RFC 9068
            — see `JWTAccessTokenClaims` for the decoded shape).
          examples:
            - 'SlAV32hkKG'
            - 'eyJhbGciOiJSUzI1NiIsInR5cCI6ImF0K2p3dCJ9.eyJpc3MiOiJodHRwczovL2FzLmV4YW1wbGUuY29tIiwiZXhwIjoxNzM1NjkzMjAwLCJhdWQiOiJodHRwczovL2FwaS5leGFtcGxlLmNvbSIsInN1YiI6InVzZXItMTIzIiwiY2xpZW50X2lkIjoiYWJjMTIzIn0.signature'
        token_type:
          type: string
          description: |
            Token presentation scheme. `Bearer` (RFC 6750) for unbound
            tokens, `DPoP` (RFC 9449) for sender-constrained tokens, or
            `N_A` for token-exchange responses where no usable access token
            is returned (RFC 8693 §2.2.1).
          examples: [Bearer, DPoP, N_A]
        expires_in:
          type: integer
          minimum: 1
          description: Lifetime of the access token in seconds.
          examples: [3600]
        refresh_token:
          type: string
          description: |
            Optional refresh token (RFC 6749 §5.1). Per OAuth 2.1 §4.3.1
            and RFC 9700 §2.2.2, refresh tokens issued to public clients
            MUST be sender-constrained (DPoP) or rotated on every use;
            RECOMMENDED for confidential clients.
        scope:
          type: string
          description: Granted scope, if different from what was requested.
        id_token:
          type: string
          description: |
            OIDC: signed JWT identifying the authenticated user. The decoded
            payload conforms to `IDTokenClaims`. Issued only when the
            request scope contained `openid`.
        issued_token_type:
          $ref: '#/components/schemas/TokenTypeURI'
          description: |
            REQUIRED in RFC 8693 §2.2.1 token-exchange responses; absent
            from other token responses.
        authorization_details:
          type: array
          description: |
            RAR (RFC 9396 §6): granted authorization detail objects. MAY be
            a subset of those requested.
          items:
            $ref: '#/components/schemas/AuthorizationDetail'

    # -----------------------------------------------------------------
    # Error response — RFC 6749 §5.2
    # -----------------------------------------------------------------
    ErrorResponse:
      description: |
        Standard OAuth error response shape (RFC 6749 §5.2). Spec extensions
        contribute additional error codes — the `error` enum below is the
        union of all registered values from this spec's covered RFCs.
      type: object
      required: [error]
      additionalProperties: true
      properties:
        error:
          type: string
          description: Single ASCII error code from the IANA OAuth Extensions Error Registry.
          enum:
            # RFC 6749 §5.2
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
            - access_denied
            - unsupported_response_type
            - server_error
            - temporarily_unavailable
            # RFC 6750 (Bearer)
            - invalid_token
            - insufficient_scope
            # RFC 7009 (Revocation §2.2.1)
            - unsupported_token_type
            # RFC 8628 (Device Grant §3.5)
            - authorization_pending
            - slow_down
            - expired_token
            # RFC 8707 (Resource Indicators §2)
            - invalid_target
            # RFC 9126 (PAR §2.3) and RFC 9101 (JAR)
            - invalid_request_uri
            - invalid_request_object
            - request_not_supported
            - request_uri_not_supported
            # RFC 9396 (RAR §5)
            - invalid_authorization_details
            # RFC 9449 (DPoP §10)
            - invalid_dpop_proof
            - use_dpop_nonce
            # OIDC Core §3.1.2.6 — authorization-endpoint-only
            - interaction_required
            - login_required
            - account_selection_required
            - consent_required
            - registration_not_supported
        error_description:
          type: string
          description: |
            Human-readable text providing additional information for the
            developer. ASCII printable characters only per RFC 6749 §5.2;
            no `"`, `\`, or non-ASCII Unicode.
          pattern: '^[\x20-\x21\x23-\x5B\x5D-\x7E]*$'
        error_uri:
          type: string
          format: uri
          description: URI of a human-readable web page describing the error.
        state:
          type: string
          description: |
            Echoed `state` from the original authorization request, when
            applicable (e.g. authorization-endpoint redirect errors).

    # -----------------------------------------------------------------
    # Device flow — RFC 8628
    # -----------------------------------------------------------------
    DeviceAuthorizationRequest:
      description: RFC 8628 §3.1.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - type: object
          required: [client_id]
          properties:
            client_id:
              type: string
            scope:
              type: string
              description: Space-delimited list of requested scopes.

    DeviceAuthorizationResponse:
      description: RFC 8628 §3.2
      type: object
      required: [device_code, user_code, verification_uri, expires_in]
      properties:
        device_code:
          type: string
          description: Long opaque device verification code (kept secret by the client).
        user_code:
          type: string
          description: Short, human-typeable code shown to the user.
          examples: ['WDJB-MJHT', '26FB-FA97']
        verification_uri:
          type: string
          format: uri
          description: End-user verification URI on the authorization server.
        verification_uri_complete:
          type: string
          format: uri
          description: 'Optional: URI with `user_code` already embedded (for QR codes).'
        expires_in:
          type: integer
          description: Lifetime in seconds of `device_code` and `user_code`.
        interval:
          type: integer
          description: Minimum polling interval in seconds (default 5).
          default: 5

    # -----------------------------------------------------------------
    # PAR — RFC 9126
    # -----------------------------------------------------------------
    PARRequest:
      description: |
        All parameters of an `/authorize` request, POSTed as a form body to
        `/par` per RFC 9126 §2.1. Per §2.1 the body MUST NOT contain
        `request_uri` (the request_uri is what `/par` returns, not what it
        accepts). PKCE `code_challenge` is REQUIRED to maintain parity with
        `/authorize` under OAuth 2.1.
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - $ref: '#/components/schemas/ResourceIndicators'
        - type: object
          required: [client_id, response_type, code_challenge, code_challenge_method]
          properties:
            response_type:
              type: string
            client_id:
              type: string
            redirect_uri:
              type: string
              format: uri
            scope:
              type: string
            state:
              type: string
            code_challenge:
              type: string
              minLength: 43
              maxLength: 128
              pattern: '^[A-Za-z0-9._~-]+$'
            code_challenge_method:
              type: string
              enum: [S256]
              default: S256
            nonce:
              type: string
            prompt:
              type: string
            login_hint:
              type: string
            max_age:
              type: integer
              minimum: 0
            ui_locales:
              type: string
            id_token_hint:
              type: string
            acr_values:
              type: string
            response_mode:
              type: string
            display:
              type: string
              enum: [page, popup, touch, wap]
            claims:
              type: string
              description: JSON-encoded claims request (OIDC Core §5.5).
            authorization_details:
              type: string
              description: JSON-encoded array of AuthorizationDetail (RFC 9396).
            request:
              type: string
              description: Optional signed JWT request object (JAR, RFC 9101 §5).
            dpop_jkt:
              type: string
              description: 'DPoP key thumbprint binding (RFC 9449 §10.1).'

    PARResponse:
      description: |
        RFC 9126 §2.2 — returned with HTTP 201 Created and a
        `Cache-Control: no-store` header.
      type: object
      required: [request_uri, expires_in]
      properties:
        request_uri:
          type: string
          format: uri
          description: |
            Reference URI to be passed to `/authorize` in the `request_uri`
            query parameter. MUST start with the URN prefix
            `urn:ietf:params:oauth:request_uri:` per RFC 9126 §2.2.
          pattern: '^urn:ietf:params:oauth:request_uri:.+$'
          examples:
            - 'urn:ietf:params:oauth:request_uri:6esc_11ACC5bwc014ltc14eY22c'
        expires_in:
          type: integer
          minimum: 5
          maximum: 600
          description: |
            Lifetime in seconds of the `request_uri`. Typical range is
            5-600 seconds per RFC 9126 §2.2 guidance.
          examples: [60]

    # -----------------------------------------------------------------
    # Introspection — RFC 7662
    # -----------------------------------------------------------------
    IntrospectionRequest:
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: The token to introspect (access or refresh token).
            token_type_hint:
              type: string
              description: |
                Hint to the AS about the type of token being introspected.
                Values come from the IANA OAuth Token Type Hint registry
                (RFC 7009 §4.1.2); the schema is kept open rather than a
                closed enum so future registrations work without spec churn.
              examples: [access_token, refresh_token]

    IntrospectionResponse:
      description: |
        RFC 7662 §2.2. Always returned with HTTP 200, even for inactive
        tokens (then only `{"active": false}` is included). Open to
        registered extension members per §2.2 — `cnf` (RFC 7800), DPoP
        binding (RFC 9449), `authorization_details` (RFC 9396 §9), etc.
      type: object
      required: [active]
      additionalProperties: true
      properties:
        active:
          type: boolean
          description: |
            REQUIRED. Whether the token is currently valid. If `false`, all
            other fields MAY be omitted.
        scope:
          type: string
        client_id:
          type: string
        username:
          type: string
        token_type:
          type: string
          description: 'Typically `Bearer` (RFC 6750) or `DPoP` (RFC 9449).'
        exp:
          $ref: '#/components/schemas/NumericDate'
          description: Expiration time (seconds since 1970-01-01T00:00:00Z).
        iat:
          $ref: '#/components/schemas/NumericDate'
          description: Issued at (seconds since 1970-01-01T00:00:00Z).
        nbf:
          $ref: '#/components/schemas/NumericDate'
        sub:
          type: string
        aud:
          oneOf:
            - $ref: '#/components/schemas/StringOrURI'
            - type: array
              items:
                $ref: '#/components/schemas/StringOrURI'
        iss:
          $ref: '#/components/schemas/StringOrURI'
        jti:
          type: string
        cnf:
          $ref: '#/components/schemas/Confirmation'
          description: |
            Confirmation method (RFC 7800) — present for sender-constrained
            tokens (DPoP `cnf.jkt` per RFC 9449 §6.1, mTLS `cnf.x5t#S256`
            per RFC 8705 §3.2).
        authorization_details:
          type: array
          description: 'RAR (RFC 9396 §9): granted authorization details for this token.'
          items:
            $ref: '#/components/schemas/AuthorizationDetail'

    # -----------------------------------------------------------------
    # Revocation — RFC 7009
    # -----------------------------------------------------------------
    RevocationRequest:
      allOf:
        - $ref: '#/components/schemas/ClientAuthFields'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: The token (access or refresh) to revoke.
            token_type_hint:
              type: string
              description: |
                Hint to the AS about the token type. Open per IANA OAuth
                Token Type Hint registry (RFC 7009 §4.1.2).
              examples: [access_token, refresh_token]

    # -----------------------------------------------------------------
    # JWKS — RFC 7517
    # -----------------------------------------------------------------
    JWKS:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JWK'

    JWK:
      type: object
      required: [kty]
      additionalProperties: true
      description: |
        JSON Web Key per RFC 7517 §4. Algorithm-specific parameters are
        defined in RFC 7518 (JWA) and RFC 8037 (OKP). The `kty` enum is
        kept open per the IANA registry — additional key types (e.g.
        post-quantum) may appear over time.
      properties:
        kty:
          type: string
          description: 'Key Type (RFC 7517 §4.1) — IANA-registered.'
          examples: [RSA, EC, OKP, oct]
        use:
          type: string
          enum: [sig, enc]
          description: |
            Public Key Use (§4.2). `sig` for signature, `enc` for
            encryption. `use` and `key_ops` SHOULD NOT be used together; if
            both are present the information they convey MUST be consistent
            (RFC 7517 §4.3).
        key_ops:
          type: array
          description: |
            Allowed key operations (§4.3). Values are from the IANA
            JSON Web Key Operations registry (§8.3): `sign`, `verify`,
            `encrypt`, `decrypt`, `wrapKey`, `unwrapKey`, `deriveKey`,
            `deriveBits`. `key_ops` and `use` SHOULD NOT be used together; if
            both are present they MUST be consistent (RFC 7517 §4.3).
          items:
            type: string
            enum: [sign, verify, encrypt, decrypt, wrapKey, unwrapKey, deriveKey, deriveBits]
        alg:
          type: string
          description: 'Algorithm intended for use with the key (§4.4).'
          examples: [RS256, RS384, RS512, ES256, ES384, ES512, EdDSA, PS256, HS256]
        kid:
          type: string
          description: 'Key ID for selection in a JWKS (§4.5).'
        x5u:
          type: string
          format: uri
          description: 'URL of an X.509 certificate or chain (§4.6).'
        x5c:
          type: array
          description: |
            X.509 certificate chain (§4.7). Each item is a **base64-encoded**
            (NOT base64url-encoded) DER PKIX certificate. The first entry is
            the certificate corresponding to the public key.
          items:
            type: string
        x5t:
          type: string
          description: 'X.509 SHA-1 thumbprint (§4.8); base64url-encoded.'
        'x5t#S256':
          type: string
          description: 'X.509 SHA-256 thumbprint (§4.9); base64url-encoded.'
        # RSA (RFC 7518 §6.3)
        n:
          type: string
          description: 'RSA modulus, base64url-encoded.'
        e:
          type: string
          description: 'RSA exponent, base64url-encoded.'
        # EC + OKP (RFC 7518 §6.2 + RFC 8037)
        crv:
          type: string
          description: |
            Curve identifier. EC: `P-256`, `P-384`, `P-521`,
            `secp256k1`. OKP (RFC 8037): `Ed25519`, `Ed448`, `X25519`, `X448`.
        x:
          type: string
          description: 'EC/OKP x coordinate or public key, base64url.'
        y:
          type: string
          description: 'EC y coordinate, base64url. Not used for OKP.'
        # oct (RFC 7518 §6.4) — symmetric keys
        k:
          type: string
          description: 'Symmetric key value (oct kty), base64url-encoded.'

    # -----------------------------------------------------------------
    # Discovery document — OIDC Discovery 1.0 + RFC 8414
    # -----------------------------------------------------------------
    OpenIDProviderMetadata:
      description: |
        OpenID Provider metadata returned at
        `/.well-known/openid-configuration` (OIDC Discovery 1.0 §3). It is the
        OAuth 2.0 AS metadata plus the fields OIDC additionally makes REQUIRED.
      allOf:
        - $ref: '#/components/schemas/OAuthServerMetadata'
        - type: object
          required:
            # OIDC Discovery 1.0 §3 REQUIRED beyond RFC 8414's set.
            - authorization_endpoint
            - token_endpoint
            - jwks_uri
            - subject_types_supported
            - id_token_signing_alg_values_supported
    OAuthServerMetadata:
      description: |
        OAuth 2.0 Authorization Server Metadata (RFC 8414 §2), returned at
        `/.well-known/oauth-authorization-server` and reused as the base for
        OIDC discovery. RFC 8414 makes only `issuer` and
        `response_types_supported` UNCONDITIONALLY required; `jwks_uri` is
        OPTIONAL, and `authorization_endpoint`/`token_endpoint` are required
        only when a supported grant type uses them — so a valid plain-OAuth AS
        may omit them. OIDC providers require a larger set (see
        `OpenIDProviderMetadata`). The OIDC-specific fields
        (`userinfo_endpoint`, `subject_types_supported`,
        `id_token_signing_alg_values_supported`, and the `id_token_*`/
        `userinfo_*` algorithm arrays) MAY be omitted by an OAuth-only AS.
      type: object
      additionalProperties: true
      required:
        # RFC 8414 §2 unconditionally-REQUIRED metadata only.
        - issuer
        - response_types_supported
      properties:

        # ---- Endpoints (RFC 8414 §2 + OIDC Discovery §3 + extensions) ----
        issuer:
          type: string
          format: uri
          description: |
            Canonical issuer URL using HTTPS (no query/fragment). MUST be
            byte-identical to the value in tokens' `iss` claim and to the
            base of the discovery URL.
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        userinfo_endpoint:
          type: string
          format: uri
          description: 'OIDC: RECOMMENDED. Standard claim Endpoint per OIDC Core §5.3.'
        jwks_uri:
          type: string
          format: uri
          description: HTTPS URL of the JWK Set. REQUIRED for OIDC.
        registration_endpoint:
          type: string
          format: uri
          description: Dynamic Client Registration endpoint (RFC 7591).
        introspection_endpoint:
          type: string
          format: uri
          description: Token Introspection endpoint (RFC 7662).
        revocation_endpoint:
          type: string
          format: uri
          description: Token Revocation endpoint (RFC 7009).
        device_authorization_endpoint:
          type: string
          format: uri
          description: Device Authorization endpoint (RFC 8628).
        pushed_authorization_request_endpoint:
          type: string
          format: uri
          description: Pushed Authorization Request endpoint (RFC 9126).
        backchannel_authentication_endpoint:
          type: string
          format: uri
          description: OIDC CIBA backchannel authentication endpoint.
        end_session_endpoint:
          type: string
          format: uri
          description: OIDC RP-Initiated Logout endpoint.
        check_session_iframe:
          type: string
          format: uri
          description: 'OIDC Session Management 1.0: HTML iframe URL for session-state polling.'
        mtls_endpoint_aliases:
          type: object
          description: |
            RFC 8705 §5: aliases for endpoints when accessed via mutual TLS,
            allowing the AS to expose mTLS-only variants of token,
            revocation, introspection, etc.
          properties:
            token_endpoint: { type: string, format: uri }
            revocation_endpoint: { type: string, format: uri }
            introspection_endpoint: { type: string, format: uri }
            device_authorization_endpoint: { type: string, format: uri }
            pushed_authorization_request_endpoint: { type: string, format: uri }
            userinfo_endpoint: { type: string, format: uri }
            registration_endpoint: { type: string, format: uri }
          additionalProperties:
            type: string
            format: uri

        # ---- Capability/feature arrays ----
        scopes_supported:
          type: array
          items: { type: string }
        response_types_supported:
          type: array
          items: { type: string }
          description: |
            REQUIRED. For OIDC dynamic providers, MUST include `code`,
            `id_token`, and `token id_token` per OIDC Core §3.
        response_modes_supported:
          type: array
          items:
            type: string
            enum: [query, fragment, form_post, jwt, query.jwt, fragment.jwt, form_post.jwt]
          description: 'Default if omitted: `["query", "fragment"]`.'
        grant_types_supported:
          type: array
          items: { type: string }
          description: 'Default if omitted: `["authorization_code", "implicit"]` per RFC 8414. (Implicit is deprecated by OAuth 2.1.)'
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - client_secret_basic
              - client_secret_post
              - client_secret_jwt
              - private_key_jwt
              - tls_client_auth
              - self_signed_tls_client_auth
          description: 'Default if omitted: `["client_secret_basic"]`.'
        token_endpoint_auth_signing_alg_values_supported:
          type: array
          items: { type: string }
          description: |
            REQUIRED when `client_secret_jwt` or `private_key_jwt` appears in
            `token_endpoint_auth_methods_supported`. Lists JWS `alg` values
            accepted for the `client_assertion` JWT.
        revocation_endpoint_auth_methods_supported:
          type: array
          items: { type: string }
        revocation_endpoint_auth_signing_alg_values_supported:
          type: array
          items: { type: string }
        introspection_endpoint_auth_methods_supported:
          type: array
          items: { type: string }
        introspection_endpoint_auth_signing_alg_values_supported:
          type: array
          items: { type: string }

        # ---- ID token signing/encryption (OIDC Discovery §3) ----
        id_token_signing_alg_values_supported:
          type: array
          items: { type: string }
          description: REQUIRED for OIDC. MUST include `RS256` per OIDC Core §15.1.
        id_token_encryption_alg_values_supported:
          type: array
          items: { type: string }
        id_token_encryption_enc_values_supported:
          type: array
          items: { type: string }

        # ---- UserInfo signing/encryption (OIDC Discovery §3) ----
        userinfo_signing_alg_values_supported:
          type: array
          items: { type: string }
        userinfo_encryption_alg_values_supported:
          type: array
          items: { type: string }
        userinfo_encryption_enc_values_supported:
          type: array
          items: { type: string }

        # ---- Request object signing/encryption (OIDC Discovery §3 + JAR) ----
        request_object_signing_alg_values_supported:
          type: array
          items: { type: string }
        request_object_encryption_alg_values_supported:
          type: array
          items: { type: string }
        request_object_encryption_enc_values_supported:
          type: array
          items: { type: string }

        # ---- Subject + claims (OIDC Discovery §3) ----
        subject_types_supported:
          type: array
          items:
            type: string
            enum: [public, pairwise]
          description: REQUIRED for OIDC.
        claims_supported:
          type: array
          items: { type: string }
          description: 'OIDC: list of standard claim names the OP MAY supply.'
        claim_types_supported:
          type: array
          items:
            type: string
            enum: [normal, aggregated, distributed]
          description: 'OIDC: claim types supported. Default: `["normal"]`.'
        claims_locales_supported:
          type: array
          items: { type: string }
        claims_parameter_supported:
          type: boolean
          description: Whether the OP supports the `claims` request parameter (OIDC Core §5.5).
          default: false

        # ---- UI / locales (OIDC Discovery §3) ----
        display_values_supported:
          type: array
          items:
            type: string
            enum: [page, popup, touch, wap]
        ui_locales_supported:
          type: array
          items: { type: string }
        acr_values_supported:
          type: array
          items: { type: string }

        # ---- Request handling (OIDC Discovery §3 + JAR + PAR) ----
        request_parameter_supported:
          type: boolean
          description: Whether the OP supports the `request` parameter (OIDC Core §6, RFC 9101 JAR).
          default: false
        request_uri_parameter_supported:
          type: boolean
          description: Whether the OP supports the `request_uri` parameter (OIDC Core §6, RFC 9126 PAR).
          default: true
        require_request_uri_registration:
          type: boolean
          description: Whether `request_uri` values MUST be pre-registered.
          default: false
        require_pushed_authorization_requests:
          type: boolean
          description: 'PAR (RFC 9126): if true, `/authorize` MUST be reached via `request_uri` from PAR.'
          default: false

        # ---- PKCE (RFC 7636 + RFC 8414) ----
        code_challenge_methods_supported:
          type: array
          items:
            type: string
            enum: [S256]
          description: |
            PKCE methods supported. Under OAuth 2.1 / RFC 9700 §4.8 the
            value MUST be `["S256"]`; the legacy `plain` method is omitted.

        # ---- DPoP (RFC 9449) ----
        dpop_signing_alg_values_supported:
          type: array
          items: { type: string }

        # ---- mTLS (RFC 8705) ----
        tls_client_certificate_bound_access_tokens:
          type: boolean
          description: |
            Whether the AS issues access tokens bound to a TLS client
            certificate's hash (cnf.x5t#S256). RFC 8705 §3.
          default: false

        # ---- RAR (RFC 9396) ----
        authorization_details_types_supported:
          type: array
          items: { type: string }

        # ---- Issuer Identifier (RFC 9207) ----
        authorization_response_iss_parameter_supported:
          type: boolean
          description: |
            Whether the AS includes an `iss` parameter in authorization
            responses for mix-up attack prevention. RFC 9207.
          default: false

        # ---- OIDC Logout 1.0 ----
        frontchannel_logout_supported:
          type: boolean
          default: false
        frontchannel_logout_session_supported:
          type: boolean
          default: false
        backchannel_logout_supported:
          type: boolean
          default: false
        backchannel_logout_session_supported:
          type: boolean
          default: false
        http_logout_supported:
          type: boolean
          description: Legacy OIDC HTTP-Based Logout (older Microsoft).
          default: false

        # ---- CIBA (OIDC) ----
        backchannel_token_delivery_modes_supported:
          type: array
          items:
            type: string
            enum: [poll, ping, push]
        backchannel_user_code_parameter_supported:
          type: boolean
          default: false
        backchannel_authentication_request_signing_alg_values_supported:
          type: array
          items: { type: string }

        # ---- Documentation links (OIDC Discovery §3) ----
        service_documentation:
          type: string
          format: uri
        op_policy_uri:
          type: string
          format: uri
        op_tos_uri:
          type: string
          format: uri

        # ---- Signed metadata (RFC 8414 §2.1) ----
        signed_metadata:
          type: string
          description: |
            JWT containing all of the above metadata, signed by the AS.
            When present, takes precedence over individual fields per
            RFC 8414 §3.1.

    # -----------------------------------------------------------------
    # UserInfo — OIDC Core §5
    # -----------------------------------------------------------------
    UserInfoResponse:
      description: |
        OIDC standard claims (§5.1) returned by `/userinfo`. The `sub` claim
        is REQUIRED; all others are optional and depend on requested scopes.
      type: object
      required: [sub]
      properties:
        sub:
          type: string
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        middle_name:
          type: string
        nickname:
          type: string
        preferred_username:
          type: string
        profile:
          type: string
          format: uri
        picture:
          type: string
          format: uri
        website:
          type: string
          format: uri
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        gender:
          type: string
        birthdate:
          type: string
          format: date
        zoneinfo:
          type: string
        locale:
          type: string
        phone_number:
          type: string
        phone_number_verified:
          type: boolean
        address:
          type: object
          properties:
            formatted:
              type: string
            street_address:
              type: string
            locality:
              type: string
            region:
              type: string
            postal_code:
              type: string
            country:
              type: string
        updated_at:
          $ref: '#/components/schemas/NumericDate'

    UserInfoSignedResponse:
      description: |
        UserInfo claims wrapped in a JWT (signed and/or encrypted) per
        OIDC Core §5.3.2. When the `Accept` is `application/jwt`, the
        response body is a compact-serialized JWT whose payload includes
        `iss` (REQUIRED — the OP) and `aud` (REQUIRED — the requesting
        client) in addition to the standard claims.
      allOf:
        - type: object
          required: [iss, aud, sub]
          properties:
            iss:
              $ref: '#/components/schemas/StringOrURI'
            aud:
              oneOf:
                - $ref: '#/components/schemas/StringOrURI'
                - type: array
                  items:
                    $ref: '#/components/schemas/StringOrURI'
        - $ref: '#/components/schemas/UserInfoResponse'

    # -----------------------------------------------------------------
    # JWT primitives — RFC 7519 §2 helpers (used across schemas)
    # -----------------------------------------------------------------
    JWT:
      type: string
      description: |
        A JWT in JWS Compact Serialization format per RFC 7519 §3 — three
        base64url segments separated by dots: `header.payload.signature`.
        For JWE-encrypted JWTs, five segments separated by dots.
      pattern: '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+(\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+)?$'
      examples: ['eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.signature_here']

    StringOrURI:
      type: string
      description: |
        Per RFC 7519 §2: an arbitrary string value; if the string contains a
        `:` character, it MUST be a URI per RFC 3986. Used for `iss`, `aud`,
        `sub`, `jti` JWT claims.

    NumericDate:
      type: number
      description: |
        Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
        ignoring leap seconds. NOT necessarily an integer — fractional seconds
        are permitted.
      examples: [1735689600, 1735689600.123]

    # -----------------------------------------------------------------
    # ID Token claims — OIDC Core §2 (decoded payload of TokenResponse.id_token)
    # -----------------------------------------------------------------
    IDTokenClaims:
      description: |
        Decoded payload of an OIDC ID Token. The wire form is a signed JWT
        carried in `TokenResponse.id_token`; this schema documents the
        payload shape so consumers can model the decoded claims.
      type: object
      required: [iss, sub, aud, exp, iat]
      additionalProperties: true
      properties:
        iss:
          $ref: '#/components/schemas/StringOrURI'
          description: REQUIRED. Issuer Identifier — MUST equal the OP's `issuer`.
        sub:
          type: string
          description: REQUIRED. Subject identifier (locally unique within the issuer).
        aud:
          description: REQUIRED. Audience(s) — MUST contain the requesting client_id.
          oneOf:
            - $ref: '#/components/schemas/StringOrURI'
            - type: array
              items:
                $ref: '#/components/schemas/StringOrURI'
        exp:
          $ref: '#/components/schemas/NumericDate'
          description: REQUIRED. Expiration time.
        iat:
          $ref: '#/components/schemas/NumericDate'
          description: REQUIRED. Issued at.
        auth_time:
          $ref: '#/components/schemas/NumericDate'
          description: REQUIRED if `max_age` was requested or `auth_time` is essential.
        nonce:
          type: string
          description: REQUIRED if `nonce` was sent in the auth request.
        acr:
          type: string
          description: Authentication Context Class Reference.
        amr:
          type: array
          items: { type: string }
          description: Authentication Methods Reference (RFC 8176).
        azp:
          type: string
          description: |
            OPTIONAL. Authorized party — the party to which the ID Token was
            issued (OIDC Core §2). Needed only when the ID Token has a SINGLE
            audience that differs from the authorized party; if present it MUST
            contain the `client_id`. It is NOT required merely because `aud`
            has multiple values.

    # -----------------------------------------------------------------
    # JWT Profile for Access Tokens — RFC 9068 §2.2
    # -----------------------------------------------------------------
    JWTAccessTokenClaims:
      description: |
        Decoded payload of a JWT-profile access token per RFC 9068 §2.2.
        Wire form is a signed JWT with JOSE header `typ: at+jwt`. When an
        AS issues JWT access tokens (advertised via signing alg arrays in
        discovery), `TokenResponse.access_token` will be one of these.
      type: object
      required: [iss, exp, aud, sub, client_id, iat, jti]
      additionalProperties: true
      properties:
        iss:
          $ref: '#/components/schemas/StringOrURI'
          description: REQUIRED. Issuer Identifier of the AS.
        exp:
          $ref: '#/components/schemas/NumericDate'
        aud:
          description: REQUIRED. Resource server identifier(s).
          oneOf:
            - $ref: '#/components/schemas/StringOrURI'
            - type: array
              items:
                $ref: '#/components/schemas/StringOrURI'
        sub:
          type: string
          description: |
            REQUIRED. End-user's identifier; for `client_credentials` grant
            this MUST equal `client_id`.
        client_id:
          type: string
          description: REQUIRED. Identifier of the OAuth client.
        iat:
          $ref: '#/components/schemas/NumericDate'
        jti:
          type: string
          description: REQUIRED. Unique identifier for replay protection.
        auth_time:
          $ref: '#/components/schemas/NumericDate'
        acr:
          type: string
        amr:
          type: array
          items: { type: string }
        scope:
          type: string
          description: 'OAuth scopes granted (space-delimited).'
        groups:
          type: array
          items: { type: string }
        roles:
          type: array
          items: { type: string }
        entitlements:
          type: array
          items: { type: string }
        cnf:
          $ref: '#/components/schemas/Confirmation'
          description: |
            Confirmation method (RFC 7800) — present for sender-constrained
            tokens (DPoP `cnf.jkt` per RFC 9449 §6.1, mTLS `cnf.x5t#S256`
            per RFC 8705).

    Confirmation:
      type: object
      description: 'Token-binding confirmation methods per RFC 7800.'
      properties:
        jkt:
          type: string
          description: |
            JWK SHA-256 thumbprint per RFC 7638. Used for DPoP-bound
            tokens (RFC 9449 §6.1).
        'x5t#S256':
          type: string
          description: 'Certificate SHA-256 thumbprint for mTLS-bound tokens (RFC 8705 §3.1).'
        jwk:
          type: object
          description: Embedded JWK; rarely used.
        kid:
          type: string

    # -----------------------------------------------------------------
    # Rich Authorization Requests — RFC 9396 §2
    # -----------------------------------------------------------------
    AuthorizationDetail:
      description: |
        A single authorization detail object per RFC 9396 §2. Sent in the
        `authorization_details` parameter at `/authorize`, `/par`, and
        `/token`; echoed back in token and introspection responses.
        Type-specific fields are added by each `type`'s consuming RFC.
      type: object
      required: [type]
      additionalProperties: true
      properties:
        type:
          type: string
          description: |
            REQUIRED. Identifier of the authorization detail type, defined
            by extending RFCs (e.g. `payment_initiation` for FAPI 2.0).
        locations:
          type: array
          items:
            type: string
            format: uri
          description: Resource server locations this detail applies to.
        actions:
          type: array
          items: { type: string }
          description: Permitted actions (e.g. `read`, `write`).
        datatypes:
          type: array
          items: { type: string }
          description: Data type categories (e.g. `account_info`).
        identifier:
          type: string
          description: Type-specific identifier (e.g. an account number).
        privileges:
          type: array
          items: { type: string }

  # ---------------------------------------------------------------------------
  # Security schemes
  # ---------------------------------------------------------------------------
  securitySchemes:

    bearerAuth:
      type: http
      scheme: bearer
      description: |
        OAuth 2.0 Bearer Token presentation per RFC 6750 §2.1
        (`Authorization: Bearer <token>` header). The token format is
        implementation-defined: it MAY be opaque (validated via
        introspection — RFC 7662) or a JWT (RFC 9068 §2 — `typ: at+jwt`,
        validated locally against `jwks_uri`). `bearerFormat` is intentionally
        omitted because both forms are common in the wild.

    dpop:
      type: apiKey
      in: header
      name: Authorization
      description: |
        DPoP-bound access token (RFC 9449). The HTTP Authorization header
        carries `DPoP <access-token>`, and a SECOND `DPoP` header MUST also
        be sent containing a fresh proof JWT (typ=`dpop+jwt`). OpenAPI 3.1
        cannot natively model the second-header requirement under a single
        `securityScheme`; operations using DPoP also accept the `DPoP`
        request-header parameter (`components.parameters.DPoPHeader`) to
        document it. RFC 9449 §7.1 also defines a DPoP `WWW-Authenticate`
        challenge with an `algs` parameter for resource servers.

    clientSecretBasic:
      type: http
      scheme: basic
      description: |
        Client authentication via HTTP Basic with `client_id:client_secret`
        per RFC 6749 §2.3.1. PREFERRED over `clientSecretPost` per the same
        section.

    clientSecretPost:
      type: apiKey
      in: header
      name: X-OAuth-Client-Secret-Post
      description: |
        Client authentication via `client_id` + `client_secret` form fields
        in the request body (RFC 6749 §2.3.1). NOT RECOMMENDED — prefer
        `clientSecretBasic`. This scheme is a documentation marker only;
        OpenAPI lacks a body-credentials security type. In practice the
        fields appear in `ClientAuthFields` and the operation's request body.

    clientAssertion:
      type: apiKey
      in: header
      name: X-OAuth-Client-Assertion
      description: |
        Client authentication via JWT bearer assertion — form fields
        `client_assertion_type` (the URN
        `urn:ietf:params:oauth:client-assertion-type:jwt-bearer`) and
        `client_assertion` (a JWT) per RFC 7523 §2.2. Used for
        `client_secret_jwt` and `private_key_jwt`. This scheme is a
        documentation marker only; the actual fields live in
        `ClientAuthFields` (which is mixed into every token-endpoint-style
        request schema).

    mtls:
      type: mutualTLS
      description: |
        Mutual TLS client authentication per RFC 8705. Either PKI-style
        (`tls_client_auth`) or self-signed (`self_signed_tls_client_auth`)
        as advertised in `token_endpoint_auth_methods_supported`.

    none:
      type: apiKey
      in: header
      name: X-No-Authentication
      description: |
        Public client — no client authentication. Permitted for native and
        SPA clients under OAuth 2.1, provided PKCE is used.

    oauth2:
      type: oauth2
      description: |
        OAuth 2.0 / OIDC flows. Use this scheme on protected resources to
        declare which scopes a caller must hold.
      flows:
        authorizationCode:
          authorizationUrl: 'https://as.example.com/authorize'
          tokenUrl: 'https://as.example.com/token'
          refreshUrl: 'https://as.example.com/token'
          scopes:
            openid: OIDC — issue an ID token
            profile: OIDC — basic profile claims
            email: OIDC — e-mail and verification
            offline_access: Issue a refresh token
        clientCredentials:
          tokenUrl: 'https://as.example.com/token'
          refreshUrl: 'https://as.example.com/token'
          scopes: {}
