      title: StringOrURI
      type: string
    NumericDate:
      description: |
        Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
        ignoring leap seconds. NOT necessarily an integer — fractional seconds
        are permitted.
      title: updated_at
      type: number
    IDTokenClaims:
      additionalProperties: {}
      description: |
        Decoded payload of an OIDC ID Token. The wire form is a signed JWT
        carried in `TokenResponse.id_token`; this schema documents the
        payload shape so consumers can model the decoded claims.
      properties:
        iss:
          description: |
            Per RFC 7519 §2: an arbitrary string value; if the string contains a
            `:` character, it MUST be a URI per RFC 3986. Used for `iss`, `aud`,
            `sub`, `jti` JWT claims.
          title: StringOrURI
          type: string
        sub:
          description: REQUIRED. Subject identifier (locally unique within the issuer).
        aud:
          $ref: "#/components/schemas/IDTokenClaims_aud"
        exp:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        iat:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        auth_time:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        nonce:
          description: REQUIRED if `nonce` was sent in the auth request.
        acr:
          description: Authentication Context Class Reference.
        amr:
          description: Authentication Methods Reference (RFC 8176).
          items:
            title: kid
            type: string
        azp:
          description: Authorized party — REQUIRED when `aud` has multiple values.
      required:
      - aud
      - exp
      - iat
      - iss
      - sub
    JWTAccessTokenClaims:
      additionalProperties: {}
      description: |
        Decoded payload of a JWT-profile access token per RFC 9068 §2.2.
        Wire form is a signed JWT with JOSE header `typ: at+jwt`. When an
        AS issues JWT access tokens (advertised via signing alg arrays in
        discovery), `TokenResponse.access_token` will be one of these.
      properties:
        iss:
          description: |
            Per RFC 7519 §2: an arbitrary string value; if the string contains a
            `:` character, it MUST be a URI per RFC 3986. Used for `iss`, `aud`,
            `sub`, `jti` JWT claims.
          title: StringOrURI
          type: string
        exp:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        aud:
          $ref: "#/components/schemas/JWTAccessTokenClaims_aud"
        sub:
          description: |
            REQUIRED. End-user's identifier; for `client_credentials` grant
            this MUST equal `client_id`.
        client_id:
          description: REQUIRED. Identifier of the OAuth client.
        iat:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        jti:
          description: REQUIRED. Unique identifier for replay protection.
        auth_time:
          description: |
            Per RFC 7519 §2: number containing seconds since 1970-01-01T00:00:00Z UTC,
            ignoring leap seconds. NOT necessarily an integer — fractional seconds
            are permitted.
          title: updated_at
          type: number
        acr:
          title: kid
          type: string
        amr:
          items: {}
        scope:
          description: OAuth scopes granted (space-delimited).
        groups:
          items: {}
        roles:
          items: {}
        entitlements:
          items: {}
        cnf:
          $ref: "#/components/schemas/Confirmation"
      required:
      - aud
      - client_id
      - exp
      - iat
      - iss
      - jti
      - sub
    Confirmation:
      description: Token-binding confirmation methods per RFC 7800.
      example:
        x5t#S256: x5t#S256
        jkt: jkt
        kid: kid
        jwk: "{}"
      properties:
        jkt:
          description: |
            JWK SHA-256 thumbprint per RFC 7638. Used for DPoP-bound
            tokens (RFC 9449 §6.1).
          title: jkt
          type: string
        x5t#S256:
          description: Certificate SHA-256 thumbprint for mTLS-bound tokens (RFC 8705
            §3.1).
          title: x5t#S256
          type: string
        jwk:
          description: Embedded JWK; rarely used.
          title: jwk
          type: object
        kid:
          title: kid
          type: string
      title: Confirmation
    AuthorizationDetail:
      additionalProperties: true
      description: |
        A single authorization detail object per RFC 9396 §2. Sent in the
        `authorization_details` parameter at `/authorize`, `/par`, and
        `/token`; echoed back in token and introspection responses.
        Type-specific fields are added by each `type`'s consuming RFC.
      example:
        identifier: identifier
        privileges:
        - privileges
        - privileges
        locations:
        - https://openapi-generator.tech
        - https://openapi-generator.tech
        type: type
        actions:
        - actions
        - actions
        datatypes:
        - datatypes
        - datatypes
      properties:
        type:
          description: |
            REQUIRED. Identifier of the authorization detail type, defined
            by extending RFCs (e.g. `payment_initiation` for FAPI 2.0).
          type: string
        locations:
          description: Resource server locations this detail applies to.
          items:
            format: uri
            type: string
          type: array
        actions:
          description: "Permitted actions (e.g. `read`, `write`)."
          items:
            type: string
          type: array
        datatypes:
          description: Data type categories (e.g. `account_info`).
          items:
            type: string
          type: array
        identifier:
          description: Type-specific identifier (e.g. an account number).
          type: string
        privileges:
          items:
            type: string
          type: array
      required:
      - type
      title: AuthorizationDetail
    IntrospectionResponse_aud:
      oneOf:
      - $ref: "#/components/schemas/StringOrURI"
      - items:
          $ref: "#/components/schemas/StringOrURI"
        type: array
      title: IntrospectionResponse_aud
    DiscoveryDocument_mtls_endpoint_aliases:
      additionalProperties:
        format: uri
        type: string
      description: |
        RFC 8705 §5: aliases for endpoints when accessed via mutual TLS,
        allowing the AS to expose mTLS-only variants of token,
        revocation, introspection, etc.
      example:
        device_authorization_endpoint: https://openapi-generator.tech
        pushed_authorization_request_endpoint: https://openapi-generator.tech
        introspection_endpoint: https://openapi-generator.tech
        revocation_endpoint: https://openapi-generator.tech
        registration_endpoint: https://openapi-generator.tech
        token_endpoint: https://openapi-generator.tech
        userinfo_endpoint: https://openapi-generator.tech
      properties:
        token_endpoint:
          format: uri
        revocation_endpoint:
          format: uri
        introspection_endpoint:
          format: uri
        device_authorization_endpoint:
          format: uri
        pushed_authorization_request_endpoint:
          format: uri
        userinfo_endpoint:
          format: uri
        registration_endpoint:
          format: uri
      title: DiscoveryDocument_mtls_endpoint_aliases
    UserInfoResponse_address:
      example:
        street_address: street_address
        country: country
        formatted: formatted
        locality: locality
        region: region
        postal_code: postal_code
      properties:
        formatted:
          title: formatted
          type: string
        street_address:
          title: street_address
          type: string
        locality:
          title: locality
          type: string
        region:
          title: region
          type: string
        postal_code:
          title: postal_code
          type: string
        country:
          title: country
          type: string
      title: UserInfoResponse_address
    UserInfoSignedResponse_allOf_aud:
      oneOf:
      - $ref: "#/components/schemas/StringOrURI"
      - items:
          $ref: "#/components/schemas/StringOrURI"
        type: array
      title: UserInfoSignedResponse_allOf_aud
    IDTokenClaims_aud:
      description: REQUIRED. Audience(s) — MUST contain the requesting client_id.
      oneOf:
      - $ref: "#/components/schemas/StringOrURI"
      - items:
          $ref: "#/components/schemas/StringOrURI"
      title: IDTokenClaims_aud
    JWTAccessTokenClaims_aud:
      description: REQUIRED. Resource server identifier(s).
      oneOf:
      - $ref: "#/components/schemas/StringOrURI"
      - items:
          $ref: "#/components/schemas/StringOrURI"
      title: JWTAccessTokenClaims_aud
  securitySchemes:
    bearerAuth:
      description: |
        OAuth 2.0 Bearer Token presentation per RFC 6750 §2.1
        (`Authorization: Bearer <token>` header). The token format is
        implementation-defined: it MAY be opaque (validated via
        introspection — RFC 7662) or a JWT (RFC 9068 §2 — `typ: at+jwt`,
        validated locally against `jwks_uri`). `bearerFormat` is intentionally
        omitted because both forms are common in the wild.
      scheme: bearer
      type: http
    dpop:
      description: |
        DPoP-bound access token (RFC 9449). The HTTP Authorization header
        carries `DPoP <access-token>`, and a SECOND `DPoP` header MUST also
        be sent containing a fresh proof JWT (typ=`dpop+jwt`). OpenAPI 3.1
        cannot natively model the second-header requirement under a single
        `securityScheme`; operations using DPoP also accept the `DPoP`
        request-header parameter (`components.parameters.DPoPHeader`) to
        document it. RFC 9449 §7.1 also defines a DPoP `WWW-Authenticate`
        challenge with an `algs` parameter for resource servers.
      in: header
      name: Authorization
      type: apiKey
    clientSecretBasic:
      description: |
        Client authentication via HTTP Basic with `client_id:client_secret`
        per RFC 6749 §2.3.1. PREFERRED over `clientSecretPost` per the same
        section.
      scheme: basic
      type: http
    clientSecretPost:
      description: |
        Client authentication via `client_id` + `client_secret` form fields
        in the request body (RFC 6749 §2.3.1). NOT RECOMMENDED — prefer
        `clientSecretBasic`. This scheme is a documentation marker only;
        OpenAPI lacks a body-credentials security type. In practice the
        fields appear in `ClientAuthFields` and the operation's request body.
      in: header
      name: X-OAuth-Client-Secret-Post
      type: apiKey
    clientAssertion:
      description: |
        Client authentication via JWT bearer assertion — form fields
        `client_assertion_type` (the URN
        `urn:ietf:params:oauth:client-assertion-type:jwt-bearer`) and
        `client_assertion` (a JWT) per RFC 7523 §2.2. Used for
        `client_secret_jwt` and `private_key_jwt`. This scheme is a
        documentation marker only; the actual fields live in
        `ClientAuthFields` (which is mixed into every token-endpoint-style
        request schema).
      in: header
      name: X-OAuth-Client-Assertion
      type: apiKey
    mtls:
      description: |
        Mutual TLS client authentication per RFC 8705. Either PKI-style
        (`tls_client_auth`) or self-signed (`self_signed_tls_client_auth`)
        as advertised in `token_endpoint_auth_methods_supported`.
      type: mutualTLS
    none:
      description: |
        Public client — no client authentication. Permitted for native and
        SPA clients under OAuth 2.1, provided PKCE is used.
      in: header
      name: X-No-Authentication
      type: apiKey
    oauth2:
      description: |
        OAuth 2.0 / OIDC flows. Use this scheme on protected resources to
        declare which scopes a caller must hold.
      flows:
        authorizationCode:
          authorizationUrl: https://as.example.com/authorize
          refreshUrl: https://as.example.com/token
          scopes:
            openid: OIDC — issue an ID token
            profile: OIDC — basic profile claims
            email: OIDC — e-mail and verification
            offline_access: Issue a refresh token
          tokenUrl: https://as.example.com/token
        clientCredentials:
          refreshUrl: https://as.example.com/token
          scopes: {}
          tokenUrl: https://as.example.com/token
      type: oauth2
