{% extends "base.html" %}
{% block title %}Device activation &mdash; oauth-lab{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Device activation</h1>
<p class="text-muted">Enter the code shown on your device's screen.</p>
{% if error %}
<div class="alert alert-danger" role="alert">{{ error }}</div>
{% endif %}
<form method="post" action="/device">
    <div class="mb-3">
        <label for="user_code" class="form-label">Activation code</label>
        <input type="text" class="form-control text-uppercase font-monospace" id="user_code"
               name="user_code" value="{{ user_code or '' }}"
               placeholder="BCDF-GHJK" required autofocus
               autocomplete="off" autocapitalize="characters">
    </div>
    <button type="submit" class="btn btn-primary w-100">Continue</button>
</form>
{% endblock %}
