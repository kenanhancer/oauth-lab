[project]
name = "oauth-lab"
version = "0.1.0"
description = "OAuth 2.1 authorization server — production-grade, generated from oauth-openapi.yaml"
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
  "fastapi >=0.115",
  "uvicorn[standard] >=0.30",
  "pydantic >=2.7",
  "pydantic-settings >=2.4",
  "sqlalchemy[asyncio] >=2.0",
  "aiosqlite >=0.20",
  "asyncpg >=0.29",
  "alembic >=1.13",
  "pyjwt[crypto] >=2.9",
  "cryptography >=43",
  "argon2-cffi >=23",
  "jinja2 >=3.1",
  "python-multipart >=0.0.9",
  "itsdangerous >=2.2",
  "structlog >=24",
  "typing-extensions >=4.12",
]

[project.optional-dependencies]
dev = [
  "pytest >=8",
  "pytest-asyncio >=0.23",
  "pytest-cov >=5",
  "httpx >=0.27",
  "hypothesis >=6",
  "ruff >=0.6",
  "mypy >=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oauth_lab", "src/openapi_server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src", "."]
addopts = "-ra --strict-markers"

# OAuth scenario markers — the 5 natural categories every grant fits into.
# Tests covering a specific scenario set `pytestmark = pytest.mark.<name>`
# at module level. Filter with `pytest -m <name>`.
# `--strict-markers` (above) means unknown markers fail the run.
markers = [
  "m2m: machine-to-machine (no user, no browser) — RFC 6749 §4.4 (client_credentials)",
  "browser_flow: user-via-browser delegation — RFC 6749 §4.1 (authorization_code + PKCE) and §6 (refresh_token)",
  "device_flow: keyboardless-device flow — RFC 8628 (device_code)",
  "federation: identity-provider federation / service-account assertions — RFC 7522/7523 (saml2-bearer, jwt-bearer)",
  "delegation: token exchange / identity propagation — RFC 8693 (token-exchange)",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF", "ASYNC", "S", "SIM"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S105", "S106"]
"src/openapi_server/**" = ["E501", "F401", "N801", "N803", "N806", "B008", "UP", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = "openapi_server.*"
ignore_errors = true
