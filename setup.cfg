[metadata]
name = openapi_server
version = 1.0.0
description = # OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI  This specification describes the HTTP surface of an OAuth 2.0 / OpenID Connect authorization server in a vendor-neutral way. Every endpoint and field is cross-referenced to the source RFC or specification section.  ## Covered specifications  | Spec | Year | Subject | |---|---|---| | RFC 6749 | 2012 | OAuth 2.0 Authorization Framework | | RFC 6750 | 2012 | Bearer Token Usage | | RFC 7009 | 2013 | Token Revocation | | RFC 7517 | 2015 | JSON Web Key (JWK / JWKS) | | RFC 7519 | 2015 | JSON Web Token (JWT) | | RFC 7636 | 2015 | PKCE — Proof Key for Code Exchange | | RFC 7662 | 2015 | Token Introspection | | RFC 8414 | 2018 | Authorization Server Metadata | | RFC 8628 | 2019 | Device Authorization Grant | | RFC 8693 | 2020 | Token Exchange | | RFC 9068 | 2021 | JWT Profile for OAuth 2.0 Access Tokens | | RFC 9126 | 2021 | Pushed Authorization Requests (PAR) | | RFC 9396 | 2023 | Rich Authorization Requests (RAR) | | RFC 9449 | 2023 | DPoP — Demonstrating Proof of Possession | | RFC 9700 | 2025 | OAuth 2.0 Security Best Current Practice | | OAuth 2.1 (draft) | ongoing | Consolidated modern best practices | | OIDC Core 1.0 | 2014 | OpenID Connect identity layer | | OIDC Discovery 1.0 | 2014 | &#x60;.well-known/openid-configuration&#x60; schema |  ## Modeling notes  - **&#x60;/authorize&#x60; is browser-driven.** OpenAPI cannot precisely model 302 redirects   to a client-controlled &#x60;redirect_uri&#x60; followed by HTML consent. The parameters   and redirect semantics are described, but the response body is an approximation.   The exact behavior is in RFC 6749 §4.1.2.  - **&#x60;/token&#x60; uses a &#x60;grant_type&#x60; discriminator.** Per RFC 6749 §3.2, all grants   POST to one endpoint and are dispatched by the &#x60;grant_type&#x60; form field. This   spec uses &#x60;oneOf&#x60; + discriminator. Tooling without discriminator support may   need to flatten the schema.  - **OAuth 2.1 defaults are applied.** PKCE is mandatory for all public clients;   Implicit (&#x60;response_type&#x3D;token&#x60;) and Resource Owner Password (&#x60;grant_type&#x3D;password&#x60;)   grants are excluded as they are deprecated by OAuth 2.1.  - **DPoP is supported via a request header.** The &#x60;DPoP&#x60; header is documented on   relevant endpoints; the proof JWT itself is not modeled as a body schema. 
long_description = file: README.md
keywords = OpenAPI OAuth 2.0 + OpenID Connect — RFC-Canonical OpenAPI Specification
python_requires = >= 3.7.*
classifiers =
    Operating System :: OS Independent
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.7

[options]
install_requires = fastapi[all]
setup_requires = setuptools
package_dir = =src
packages = find_namespace:

[options.packages.find]
where = src
